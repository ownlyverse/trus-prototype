<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>바운더리 타운 — 타운 지도 (프로토타입)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
@font-face{font-family:'NeoDunggeunmo'; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_two@1.0/NeoDunggeunmo.woff') format('woff'); font-display:swap}
:root{
  --ink:#191F28; --paper:#FFF9F1;
  --night:#231B2E; --night-2:#2E2340;
  --accent:#F26D9C; --accent-d:#C24C78; --accent-soft:#FBE4EE;
  --tide:#3182F6; --shell:#F76B1C;
  --muted:#8B95A1; --line:#E8DFD2;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Pretendard Variable",Pretendard,-apple-system,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  color:var(--ink); letter-spacing:-0.01em; background:var(--night); min-height:100vh; overflow:hidden; word-break:keep-all}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}
.num{font-variant-numeric:tabular-nums}
.pxfont, .hud-btn, .pill-stat, .sign .board, .node-name, .node-sub, .busy small, .me-marker .tag,
.travel-txt, .hint, .proto-tag, .leg{font-family:'NeoDunggeunmo','Pretendard Variable',sans-serif; letter-spacing:0}

/* 밤 배경 — 별 + 창밖 불빛 (강의실·광장과 동일) */
.bg-night{position:fixed; inset:0; pointer-events:none; z-index:0;
  background:linear-gradient(var(--night) 0%, var(--night-2) 100%)}
.bg-night::before{content:""; position:absolute; left:5%; top:6%; width:4px; height:4px; background:#fff; opacity:.7;
  box-shadow:18vw 30px #FFF6C9, 39vw 8px #fff, 57vw 40px #FBE4EE, 74vw 16px #fff, 90vw 34px #C9E9FA, 28vw 70px #fff, 66vw 78px #FFF6C9, 12vw 120px #fff, 48vw 150px #FFF6C9, 82vw 130px #FBE4EE}
.bg-night::after{content:""; position:absolute; left:0; right:0; bottom:0; height:90px; opacity:.5;
  background:
    linear-gradient(#171130,#171130) 4% 100%/9% 70% no-repeat,
    repeating-linear-gradient(180deg,#F26D9C 0 5px, transparent 5px 14px) 5% 100%/5% 55% no-repeat,
    linear-gradient(#171130,#171130) 84% 100%/9% 84% no-repeat,
    repeating-linear-gradient(180deg,#46D5B2 0 5px, transparent 5px 14px) 85% 100%/5% 66% no-repeat}

/* HUD (강의실·광장과 동일) */
.hud{position:fixed; top:0; left:0; right:0; z-index:60; display:flex; align-items:center; gap:8px; padding:12px 14px; pointer-events:none}
.hud>*{pointer-events:auto}
.hud .spacer{flex:1}
.hud-btn{width:44px; height:44px; border-radius:50%; background:rgba(23,19,31,.82); border:2px solid #3E3155; color:#FFE6F0; font-size:20px;
  box-shadow:0 3px 12px rgba(0,0,0,.4), 0 0 18px rgba(242,109,156,.14); display:flex; align-items:center; justify-content:center;
  transition:transform .1s, box-shadow .1s, border-color .12s}
.hud-btn:hover{border-color:#F26D9C; box-shadow:0 3px 12px rgba(0,0,0,.4), 0 0 22px rgba(242,109,156,.35)}
.hud-btn:active{transform:translateY(2px)}
.pill-stat{display:inline-flex; align-items:center; gap:8px; padding:6px 16px 6px 6px; border-radius:22px;
  background:rgba(23,19,31,.82); border:2px solid #3E3155; color:#FFE6F0; font-size:.92rem; font-weight:700;
  box-shadow:0 3px 12px rgba(0,0,0,.4), 0 0 18px rgba(242,109,156,.14)}
.pill-stat .ic{width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg,#FFE08A,#F2A73C); border:1px solid #C98A2E; font-size:.82rem; color:#7A4E00;
  box-shadow:inset 0 1px 2px rgba(255,255,255,.55)}

/* ---------- 지도 무대 ---------- */
.scene{position:fixed; inset:0; z-index:1; display:flex; align-items:center; justify-content:center; overflow:hidden}
.map{position:relative; width:min(1000px, 94vw); height:min(640px, 82vh)}

/* 사인 board (강의실·광장 board) */
.sign{position:absolute; left:50%; top:-6px; transform:translateX(-50%); z-index:8; text-align:center; white-space:nowrap}
.sign .board{display:inline-flex; align-items:center; gap:9px; padding:9px 18px; border-radius:13px;
  background:rgba(23,19,31,.82); border:2px solid #3E3155; color:#FFE6F0;
  font-size:clamp(1.05rem,2.6vw,1.32rem); box-shadow:0 3px 0 rgba(0,0,0,.45), 0 0 22px rgba(242,109,156,.28)}

/* 범례 */
.map-legend{position:absolute; right:2px; top:2px; z-index:8; display:flex; flex-direction:column; gap:6px; align-items:flex-end}
.leg{display:inline-flex; align-items:center; gap:6px; font-size:.62rem; color:#D8CFE8;
  background:rgba(23,19,31,.7); border:2px solid #3E3155; border-radius:4px; padding:4px 9px}
.leg .sw{width:9px; height:9px; border-radius:50%; box-shadow:0 0 6px currentColor}

/* 연결선 (SVG) — 허브에서 방사형, 핑크 점선 */
.paths{position:absolute; inset:0; z-index:2; pointer-events:none}
.paths .road{stroke:rgba(242,109,156,.22); stroke-width:8; stroke-linecap:round; fill:none}
.paths .road-d{stroke:var(--accent); stroke-width:3.5; stroke-linecap:round; fill:none; stroke-dasharray:2 12; opacity:.85;
  filter:drop-shadow(0 0 4px rgba(242,109,156,.5)); animation:flow 14s linear infinite}
@keyframes flow{to{stroke-dashoffset:-140}}

/* ---------- 노드 : 크림/다크 원형 타일 ---------- */
.node{position:absolute; z-index:5; transform:translate(-50%,-50%);
  display:flex; flex-direction:column; align-items:center; gap:9px; cursor:pointer; user-select:none;
  transition:transform .16s ease}
.node:hover, .node:focus-visible{transform:translate(-50%,-50%) scale(1.09); outline:none}
.node .disc{position:relative; width:96px; height:96px; border-radius:50%;
  display:flex; align-items:center; justify-content:center; font-size:44px; line-height:1;
  background:radial-gradient(circle at 34% 26%, #FFFFFF 0%, var(--paper) 60%, #F3E6D0 100%);
  border:3px solid #17171C; box-shadow:5px 5px 0 rgba(0,0,0,.45), 0 0 22px rgba(242,109,156,.22);
  transition:box-shadow .16s ease, transform .16s ease}
.node:hover .disc, .node:focus-visible .disc{box-shadow:5px 5px 0 rgba(0,0,0,.45), 0 0 30px rgba(242,109,156,.6)}
.node.hub .disc{width:122px; height:122px; font-size:56px;
  background:radial-gradient(circle at 34% 26%, #FFFFFF 0%, var(--accent-soft) 62%, #F7C9DD 100%);
  border-color:#17171C; box-shadow:6px 6px 0 rgba(194,76,120,.5), 0 0 30px rgba(242,109,156,.5)}
.node.hub:hover .disc, .node.hub:focus-visible .disc{box-shadow:6px 6px 0 rgba(194,76,120,.5), 0 0 40px rgba(242,109,156,.85)}

.node .node-name{font-size:.78rem; color:#FFE6F0; background:rgba(23,19,31,.86);
  border:2px solid #3E3155; border-radius:5px; padding:4px 11px; white-space:nowrap; box-shadow:2px 2px 0 rgba(0,0,0,.4)}
.node.hub .node-name{background:var(--accent); color:#fff; border-color:var(--accent-d); box-shadow:2px 2px 0 var(--accent-d)}
.node .node-sub{font-size:.58rem; color:#B7AACB; margin-top:-4px}

/* 허브 맥동 링 */
.node.hub .disc::after{content:""; position:absolute; inset:-5px; border-radius:50%;
  border:3px solid rgba(242,109,156,.55); animation:hubpulse 2.2s ease-out infinite}
@keyframes hubpulse{0%{transform:scale(1); opacity:.7}100%{transform:scale(1.32); opacity:0}}

/* 잠금 배지 */
.node .lock{position:absolute; top:-4px; right:-4px; width:32px; height:32px; border-radius:50%;
  background:#3A3050; border:3px solid #17171C; box-shadow:2px 2px 0 rgba(0,0,0,.4);
  display:none; align-items:center; justify-content:center; font-size:14px; z-index:2}
.node.locked .lock{display:flex}
.node.locked .disc{filter:grayscale(.5) brightness(.82); box-shadow:5px 5px 0 rgba(0,0,0,.45), 0 0 12px rgba(242,109,156,.1)}
.node.locked:hover .disc{box-shadow:5px 5px 0 rgba(0,0,0,.45), 0 0 22px rgba(242,109,156,.35)}
.node.locked .node-name{opacity:.7}
/* 잠금 툴팁 */
.node .tip{position:absolute; bottom:calc(100% + 8px); left:50%; transform:translateX(-50%);
  background:#17131F; color:#FFD9E8; font-size:.62rem; padding:5px 10px; border-radius:3px; white-space:nowrap;
  border:2px solid #0B0912; box-shadow:2px 2px 0 rgba(0,0,0,.5); opacity:0; pointer-events:none; transition:opacity .16s; z-index:6}
.node .tip::after{content:""; position:absolute; top:100%; left:50%; transform:translateX(-50%); border:5px solid transparent; border-top-color:#17131F}
.node.locked:hover .tip{opacity:1}

/* 혼잡도 점 (광장 옆 장식) */
.busy{position:absolute; z-index:6; transform:translate(-50%,-50%);
  display:flex; align-items:center; gap:4px; background:rgba(23,19,31,.86);
  border:2px solid #3E3155; border-radius:12px; padding:4px 9px; box-shadow:2px 2px 0 rgba(0,0,0,.4)}
.busy .dot{width:7px; height:7px; border-radius:50%; background:#46D5B2; box-shadow:0 0 6px #46D5B2; animation:blink 1.4s infinite}
.busy .dot:nth-child(2){animation-delay:.2s}
.busy .dot:nth-child(3){animation-delay:.4s; background:#F2C14E; box-shadow:0 0 6px #F2C14E}
.busy small{font-size:.56rem; color:#D8CFE8}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.28}}

/* ---------- 내 위치 마커 ---------- */
.me-marker{position:absolute; z-index:9; transform:translate(-50%,-100%);
  display:flex; flex-direction:column; align-items:center; pointer-events:none;
  transition:left .9s cubic-bezier(.5,.05,.3,1), top .9s cubic-bezier(.5,.05,.3,1)}
.me-marker .tag{font-size:.58rem; background:var(--accent); color:#fff; border:2px solid var(--accent-d);
  border-radius:4px; padding:2px 7px; margin-bottom:4px; white-space:nowrap; box-shadow:1px 1px 0 var(--accent-d)}
.me-marker .spr{width:3px; height:3px; image-rendering:pixelated}
.me-marker .shadow{width:22px; height:6px; border-radius:50%; background:rgba(0,0,0,.4); margin-top:4px}
.me-marker.bob .spr{animation:bob .34s infinite alternate}
@keyframes bob{from{transform:translateY(0)}to{transform:translateY(-3px)}}

/* ---------- 이동 연출 오버레이 ---------- */
.travel{position:fixed; inset:0; z-index:90; background:rgba(20,15,28,0); backdrop-filter:blur(0);
  display:none; align-items:center; justify-content:center; pointer-events:none;
  transition:background .32s ease, backdrop-filter .32s ease}
.travel.show{display:flex; background:rgba(20,15,28,.74); backdrop-filter:blur(3px); pointer-events:auto}
.travel-box{text-align:center; color:#FFE6F0; transform:translateY(8px); opacity:0; transition:transform .3s, opacity .3s}
.travel.show .travel-box{transform:none; opacity:1}
.travel-emo{font-size:56px; animation:hop .5s ease-in-out infinite}
@keyframes hop{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.travel-txt{font-size:.95rem; margin-top:12px; text-shadow:0 0 8px rgba(242,109,156,.6)}
.travel-bar{width:180px; height:8px; border-radius:5px; background:rgba(255,255,255,.16); margin:16px auto 0; overflow:hidden; border:2px solid #17131F}
.travel-bar i{display:block; height:100%; width:0; background:linear-gradient(90deg,var(--accent),#FF9DBE); border-radius:5px; transition:width .8s linear}

/* ---------- 하단 힌트 · 링크 ---------- */
.hint{position:fixed; bottom:14px; left:50%; transform:translateX(-50%); z-index:55;
  font-size:.68rem; color:#FFE6F0; background:#17131F; border:2px solid #0B0912; border-radius:3px;
  padding:6px 16px; box-shadow:3px 3px 0 rgba(0,0,0,.4)}
.proto-tag{position:fixed; bottom:16px; right:16px; z-index:55; font-size:.6rem; color:#8478A0}
.home-link{position:fixed; bottom:12px; left:16px; z-index:55; font-size:.72rem; color:#B7AACB;
  background:rgba(23,19,31,.7); border:2px solid #3E3155; border-radius:10px; padding:6px 12px}
.home-link:hover{color:#fff; border-color:var(--accent)}

@media(max-width:560px){
  .map{height:min(560px,76vh)}
  .node .disc{width:74px; height:74px; font-size:34px}
  .node.hub .disc{width:94px; height:94px; font-size:44px}
  .node .node-name{font-size:.68rem; padding:3px 9px}
  .hint{display:none}
}
@media(prefers-reduced-motion:reduce){
  .me-marker{transition:none} .node.hub .disc::after{animation:none}
  .travel-emo{animation:none} .busy .dot{animation:none} .paths .road-d{animation:none}
}
</style>
</head>
<body>
<div class="bg-night"></div>

<!-- ============ HUD ============ -->
<header class="hud">
  <span class="pill-stat" title="내 조각"><span class="ic">◗</span><b class="num" id="shellN">20</b></span>
  <span class="spacer"></span>
  <a class="hud-btn" href="myspace-prototype.html?mode=full" title="마이스페이스로">🏠</a>
</header>

<!-- ============ 지도 무대 ============ -->
<div class="scene">
  <div class="map" id="map">
    <div class="sign"><span class="board">🗺️ 타운 지도</span></div>
    <div class="map-legend">
      <span class="leg"><span class="sw" style="color:#46D5B2">●</span>열린 공간</span>
      <span class="leg"><span class="sw" style="color:#8478A0">●</span>완강 후 열려요</span>
    </div>

    <!-- 연결선 : 허브(500,333) → 각 노드 -->
    <svg class="paths" viewBox="0 0 1000 640" preserveAspectRatio="none">
      <!-- hub → 강의실(230,180) -->
      <path class="road" d="M500 333 Q 360 250 230 180"/><path class="road-d" d="M500 333 Q 360 250 230 180"/>
      <!-- hub → 광장(795,205) -->
      <path class="road" d="M500 333 Q 660 250 795 205"/><path class="road-d" d="M500 333 Q 660 250 795 205"/>
      <!-- hub → 앤더스페이스(720,505) -->
      <path class="road" d="M500 333 Q 640 430 720 505"/><path class="road-d" d="M500 333 Q 640 430 720 505"/>
    </svg>

    <!-- 🏠 마이스페이스 (허브, 중앙) -->
    <div class="node hub" data-key="myspace" data-href="myspace-prototype.html?mode=full"
         data-label="마이스페이스" data-emo="🏠" style="left:50%; top:52%">
      <div class="disc">🏠</div>
      <div class="node-name">마이스페이스</div>
      <div class="node-sub">내 방 · 허브</div>
    </div>

    <!-- 📺 강의실 (항상 열림) -->
    <div class="node" data-key="lecture" data-href="lecture-prototype.html"
         data-label="강의실" data-emo="📺" style="left:23%; top:28%">
      <div class="lock">🔒</div>
      <div class="tip">완강 후 열려요</div>
      <div class="disc">📺</div>
      <div class="node-name">강의실</div>
      <div class="node-sub">코치와 같이 듣기</div>
    </div>

    <!-- ⛲ 광장 (완강 게이트) -->
    <div class="node" data-key="plaza" data-href="plaza-lobby-prototype.html" data-gated="1"
         data-label="광장" data-emo="⛲" style="left:79.5%; top:32%">
      <div class="lock">🔒</div>
      <div class="tip">완강 후 열려요</div>
      <div class="disc">⛲</div>
      <div class="node-name">광장</div>
      <div class="node-sub">완강자들의 자리</div>
    </div>
    <div class="busy" style="left:90%; top:20%"><span class="dot"></span><span class="dot"></span><span class="dot"></span><small>접속 41</small></div>

    <!-- 🎪 앤더스페이스 (완강 게이트) -->
    <div class="node" data-key="anderspace" data-href="anderspace-prototype.html" data-gated="1"
         data-label="앤더스페이스" data-emo="🎪" style="left:72%; top:79%">
      <div class="lock">🔒</div>
      <div class="tip">완강 후 열려요</div>
      <div class="disc">🎪</div>
      <div class="node-name">앤더스페이스</div>
      <div class="node-sub">또 다른 세계</div>
    </div>

    <!-- 내 위치 마커 (허브 옆에서 시작) -->
    <div class="me-marker" id="me" style="left:45%; top:56%">
      <div class="tag" id="meTag">김이서</div>
      <div class="spr" id="meSpr"></div>
      <div class="shadow"></div>
    </div>
  </div>
</div>

<!-- 이동 연출 -->
<div class="travel" id="travel">
  <div class="travel-box">
    <div class="travel-emo" id="travelEmo">🏠</div>
    <div class="travel-txt" id="travelTxt">이동하는 중…</div>
    <div class="travel-bar"><i id="travelBar"></i></div>
  </div>
</div>

<a class="home-link" href="index.html">← 프로토타입 목록</a>
<div class="hint">노드를 눌러 공간으로 이동해요 · 🔒는 완강 후 열려요</div>
<div class="proto-tag">타운 지도 프로토타입 · 목데이터</div>

<script>
/* ================= 픽셀 스프라이트 (내 마커) ================= */
const SPRITE_MAP = [
  '..HHHHHHHH..','.HHHHHHHHHH.','.HHHHHHHHHH.','.HHSSSSSSHH.','..SESSSSES..','..SSSSSSSS..',
  '...SSSSSS...','..TTTTTTTT..','.TTTTTTTTTT.','.TSTTTTTTST.','..TTTTTTTT..','..PPPPPPPP..',
  '..PPP..PPP..','..PPP..PPP..','..DDD..DDD..'
];
const COLORS = {H:'#4A3628', S:'#F2C9A8', E:'#222831', T:'#F26D9C', P:'#3A2E4E', D:'#C24C78'};
(function(){
  const px = 3, sh = [];
  SPRITE_MAP.forEach((row,y)=>[...row].forEach((ch,x)=>{
    const c = COLORS[ch]; if(c) sh.push(`${x*px}px ${y*px}px 0 0 ${c}`);
  }));
  const sp = document.getElementById('meSpr');
  sp.style.boxShadow = sh.join(',');
  sp.style.marginBottom = (15*px) + 'px';
})();

/* ================= HUD 조개 개수 반영 ================= */
const shells = localStorage.getItem('trus_shells');
if(shells !== null) document.getElementById('shellN').textContent = shells;

/* ================= 완강 게이트 표시 ================= */
const complete = localStorage.getItem('trus_lecture_complete') === '1';
if(!complete){
  document.querySelectorAll('.node[data-gated="1"]').forEach(n=>n.classList.add('locked'));
}

/* 이름 반영 (있으면) */
const savedName = localStorage.getItem('trus_name');
if(savedName){ document.getElementById('meTag').textContent = savedName; }

/* ================= 노드 클릭 → 마커 이동 → 이동 연출 → 이동 ================= */
const me = document.getElementById('me');
const travel = document.getElementById('travel');
const travelEmo = document.getElementById('travelEmo');
const travelTxt = document.getElementById('travelTxt');
const travelBar = document.getElementById('travelBar');
let traveling = false;

function goNode(node){
  if(traveling) return;
  traveling = true;
  const href = node.dataset.href;
  const label = node.dataset.label;
  const emo = node.dataset.emo;

  /* 마커를 노드 위치로 걸어가게 */
  me.classList.add('bob');
  me.style.left = node.style.left;
  me.style.top = 'calc(' + node.style.top + ' + 22px)';

  /* 걷는 시간(0.9s) 뒤 이동 연출 */
  setTimeout(()=>{
    me.classList.remove('bob');
    travelEmo.textContent = emo;
    travelTxt.textContent = node.classList.contains('locked')
      ? label + ' — 완강 후 열려요'
      : label + '(으)로 가는 중…';
    travel.classList.add('show');
    requestAnimationFrame(()=>{ travelBar.style.width = '100%'; });
    setTimeout(()=>{ location.href = href; }, 900);
  }, 900);
}

document.querySelectorAll('.node').forEach(node=>{
  node.setAttribute('role','button');
  node.setAttribute('tabindex','0');
  node.addEventListener('click', ()=>goNode(node));
  node.addEventListener('keydown', e=>{
    if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); goNode(node); }
  });
});
</script>
</body>
</html>
