<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>바운더리 타운 — 타운 월드맵 (프로토타입)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
@font-face{font-family:'NeoDunggeunmo'; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_two@1.0/NeoDunggeunmo.woff') format('woff'); font-display:swap}
:root{
  --ink:#191F28; --tide:#3182F6; --tide-dark:#1B64DA; --tide-soft:#E8F3FF;
  --shell:#F76B1C; --shell-soft:#FFF1E7;
  --bg:#F2F4F6; --paper:#FFFFFF; --line:#E5E8EB; --muted:#8B95A1; --sub:#4E5968;
  /* 지도 톤 — 파치먼트/잔디 */
  --parch-a:#EFE3C4; --parch-b:#E4D3AA; --grass-a:#CFE0A8; --grass-b:#B9D189;
  --path:#D8C49A; --path-d:#B99E6E;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"Pretendard Variable",Pretendard,-apple-system,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  color:var(--ink); letter-spacing:-0.01em; background:#20242E; overflow:hidden; word-break:keep-all;
}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
.num{font-variant-numeric:tabular-nums}
/* 픽셀 폰트 — 게임 UI 요소에만 */
.pill-stat,.hud-btn,.node-name,.hint,.proto-tag,.map-title,.travel-txt,.tip{
  font-family:'NeoDunggeunmo','Pretendard Variable',Pretendard,sans-serif; letter-spacing:0;
}

/* ---------- HUD ---------- */
.hud{position:fixed; top:0; left:0; right:0; z-index:60; display:flex; align-items:center; gap:8px; padding:12px 14px; pointer-events:none}
.hud>*{pointer-events:auto}
.hud .spacer{flex:1}
.pill-stat{display:inline-flex; align-items:center; gap:7px; padding:5px 14px 5px 7px; border-radius:16px; background:#F7E9C4; border:3px solid #17171C; box-shadow:0 3px 0 rgba(0,0,0,.5); font-size:.85rem; color:#4A3A18}
.pill-stat .ic{width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:#F2C14E; border:2px solid #B8860B; font-size:.7rem; color:#7A4E00}
.pill-stat.trust{background:#E7DBF5; color:#4A3572}
.pill-stat.trust .ic{background:#B79BE0; border-color:#7C5BB5}
.hud-btn{position:relative; width:42px; height:42px; border-radius:10px; background:#FFF9E9; border:3px solid #17171C; box-shadow:0 3px 0 rgba(0,0,0,.5); font-size:1.1rem; display:flex; align-items:center; justify-content:center; flex-shrink:0}
.hud-btn:active{transform:translateY(2px); box-shadow:0 1px 0 rgba(0,0,0,.5)}

/* ---------- 지도 무대 ---------- */
.scene{position:fixed; inset:0; display:flex; align-items:center; justify-content:center; overflow:hidden;
  background:
    radial-gradient(120% 100% at 50% -10%, #F6EFD8 0%, #E9D9B4 46%, #D9C79E 100%);
}
.map{
  position:relative; width:min(1040px, 94vw); height:min(660px, 82vh);
  border-radius:26px; overflow:hidden; border:4px solid #6E5236;
  box-shadow:0 26px 70px rgba(20,16,8,.5), inset 0 0 0 3px rgba(255,255,255,.25);
  background:
    /* 잔디 얼룩 */
    radial-gradient(220px 160px at 18% 78%, var(--grass-b) 0%, transparent 70%),
    radial-gradient(240px 180px at 84% 26%, var(--grass-a) 0%, transparent 72%),
    radial-gradient(200px 150px at 74% 82%, var(--grass-b) 0%, transparent 70%),
    radial-gradient(180px 140px at 12% 22%, var(--grass-a) 0%, transparent 72%),
    linear-gradient(135deg, var(--parch-a) 0%, var(--parch-b) 100%);
  image-rendering:auto;
}
/* 파치먼트 격자 질감 */
.map::before{content:""; position:absolute; inset:0; pointer-events:none;
  background:repeating-conic-gradient(rgba(110,82,54,.055) 0% 25%, transparent 0% 50%) 0 0/46px 46px}
/* 종이 가장자리 그림자 */
.map::after{content:""; position:absolute; inset:0; pointer-events:none; border-radius:22px;
  box-shadow:inset 0 0 60px rgba(110,82,54,.35)}

.map-title{position:absolute; left:18px; top:16px; z-index:8;
  font-size:.82rem; color:#F7E9C4; padding:6px 14px;
  background:repeating-linear-gradient(90deg,#8A5B44 0 26px,#7E5139 26px 52px);
  border:3px solid #4A3320; border-radius:5px; box-shadow:0 3px 0 rgba(0,0,0,.35)}
.map-legend{position:absolute; right:16px; top:16px; z-index:8; display:flex; flex-direction:column; gap:5px; align-items:flex-end}
.leg{display:inline-flex; align-items:center; gap:6px; font-size:.66rem; font-weight:700; color:#5A4A2C;
  background:rgba(255,255,255,.72); border:1.5px solid rgba(110,82,54,.35); border-radius:12px; padding:3px 9px}
.leg .sw{width:9px; height:9px; border-radius:50%}

/* 연결선 (SVG) */
.paths{position:absolute; inset:0; z-index:2; pointer-events:none}
.paths .road{stroke:var(--path); stroke-width:16; stroke-linecap:round; fill:none; opacity:.9}
.paths .road-d{stroke:var(--path-d); stroke-width:16; stroke-linecap:round; fill:none; stroke-dasharray:2 20; opacity:.55}

/* ---------- 노드 ---------- */
.node{position:absolute; z-index:5; transform:translate(-50%,-50%);
  display:flex; flex-direction:column; align-items:center; gap:7px; cursor:pointer; user-select:none;
  transition:transform .16s ease}
.node:hover{transform:translate(-50%,-50%) scale(1.09)}
.node:focus-visible{outline:none}
.node .disc{position:relative; width:98px; height:98px; border-radius:50%;
  display:flex; align-items:center; justify-content:center; font-size:46px; line-height:1;
  background:radial-gradient(circle at 34% 28%, #FFFDF6 0%, #FBEFD2 62%, #EAD3A0 100%);
  border:4px solid #6E5236; box-shadow:0 8px 0 #6E5236, 0 14px 22px rgba(20,16,8,.32);
  transition:box-shadow .16s ease, filter .16s ease}
.node:hover .disc{box-shadow:0 8px 0 #6E5236, 0 0 0 6px rgba(49,130,246,.28), 0 16px 26px rgba(20,16,8,.4)}
.node.hub .disc{width:120px; height:120px; font-size:58px;
  background:radial-gradient(circle at 34% 28%, #FFFFFF 0%, #FFE9CF 60%, #F7C79A 100%);
  border-color:#B5641E; box-shadow:0 9px 0 #B5641E, 0 16px 28px rgba(20,16,8,.4)}
.node.hub:hover .disc{box-shadow:0 9px 0 #B5641E, 0 0 0 7px rgba(247,107,28,.3), 0 18px 30px rgba(20,16,8,.45)}
.node .node-name{font-size:.82rem; color:#3A2C16; background:rgba(255,251,240,.94);
  border:2px solid #6E5236; border-radius:4px; padding:3px 11px; white-space:nowrap; box-shadow:2px 2px 0 rgba(110,82,54,.35)}
.node.hub .node-name{background:var(--shell); color:#fff; border-color:#B5641E}
.node .node-sub{font-size:.6rem; font-weight:700; color:#7A6A48; margin-top:-3px; letter-spacing:0}

/* 허브 맥동 링 */
.node.hub .disc::after{content:""; position:absolute; inset:-4px; border-radius:50%;
  border:3px solid rgba(247,107,28,.5); animation:hubpulse 2.2s ease-out infinite}
@keyframes hubpulse{0%{transform:scale(1); opacity:.7}100%{transform:scale(1.35); opacity:0}}

/* 잠금 배지 */
.node .lock{position:absolute; top:-6px; right:-6px; width:32px; height:32px; border-radius:50%;
  background:#4E5968; border:3px solid #fff; box-shadow:0 3px 6px rgba(0,0,0,.3);
  display:none; align-items:center; justify-content:center; font-size:15px; z-index:2}
.node.locked .lock{display:flex}
.node.locked .disc{filter:grayscale(.45) brightness(.94)}
/* 잠금 툴팁 */
.node .tip{position:absolute; bottom:calc(100% + 8px); left:50%; transform:translateX(-50%);
  background:#17131F; color:#fff; font-size:.66rem; padding:5px 10px; border-radius:3px; white-space:nowrap;
  border:2px solid #0B0912; box-shadow:2px 2px 0 rgba(0,0,0,.4); opacity:0; pointer-events:none; transition:opacity .16s; z-index:6}
.node .tip::after{content:""; position:absolute; top:100%; left:50%; transform:translateX(-50%); border:5px solid transparent; border-top-color:#17131F}
.node.locked:hover .tip{opacity:1}

/* 혼잡도 점 (광장 옆 장식, 목) */
.busy{position:absolute; z-index:6; transform:translate(-50%,-50%);
  display:flex; align-items:center; gap:3px; background:rgba(255,251,240,.9);
  border:2px solid #6E5236; border-radius:12px; padding:3px 8px; box-shadow:2px 2px 0 rgba(110,82,54,.3)}
.busy .dot{width:7px; height:7px; border-radius:50%; background:#1BA664; animation:blink 1.4s infinite}
.busy .dot:nth-child(2){animation-delay:.2s}
.busy .dot:nth-child(3){animation-delay:.4s; background:#F2C14E}
.busy small{font-size:.58rem; font-weight:700; color:#5A4A2C; letter-spacing:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.28}}

/* ---------- 내 위치 마커 ---------- */
.me-marker{position:absolute; z-index:9; transform:translate(-50%,-100%);
  display:flex; flex-direction:column; align-items:center; pointer-events:none;
  transition:left .9s cubic-bezier(.5,.05,.3,1), top .9s cubic-bezier(.5,.05,.3,1)}
.me-marker .tag{font-size:.6rem; background:var(--tide); color:#fff; border:2px solid var(--tide-dark);
  border-radius:3px; padding:1px 7px; margin-bottom:4px; white-space:nowrap;
  font-family:'NeoDunggeunmo','Pretendard Variable',sans-serif; letter-spacing:0}
.me-marker .spr{width:3px; height:3px; image-rendering:pixelated}
.me-marker .shadow{width:22px; height:6px; border-radius:50%; background:rgba(0,0,0,.28); margin-top:4px}
.me-marker.bob .spr{animation:bob .34s infinite alternate}
@keyframes bob{from{transform:translateY(0)}to{transform:translateY(-3px)}}

/* ---------- 이동 연출 오버레이 ---------- */
.travel{position:fixed; inset:0; z-index:90; background:rgba(20,16,8,.0); backdrop-filter:blur(0);
  display:none; align-items:center; justify-content:center; pointer-events:none;
  transition:background .32s ease, backdrop-filter .32s ease}
.travel.show{display:flex; background:rgba(20,16,8,.72); backdrop-filter:blur(3px); pointer-events:auto}
.travel-box{text-align:center; color:#F7E9C4; transform:translateY(8px); opacity:0; transition:transform .3s, opacity .3s}
.travel.show .travel-box{transform:none; opacity:1}
.travel-emo{font-size:56px; animation:hop .5s ease-in-out infinite}
@keyframes hop{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.travel-txt{font-size:1rem; margin-top:12px}
.travel-bar{width:180px; height:8px; border-radius:5px; background:rgba(255,255,255,.18); margin:16px auto 0; overflow:hidden; border:1px solid rgba(255,255,255,.25)}
.travel-bar i{display:block; height:100%; width:0; background:var(--shell); border-radius:5px; transition:width .8s linear}

/* ---------- 하단 힌트 · 링크 ---------- */
.hint{position:fixed; bottom:14px; left:50%; transform:translateX(-50%); z-index:55;
  font-size:.72rem; color:#F7E9C4; background:#17131F; border:2px solid #0B0912; border-radius:3px;
  padding:6px 16px; box-shadow:3px 3px 0 rgba(0,0,0,.4)}
.proto-tag{position:fixed; bottom:16px; right:16px; z-index:55; font-size:.64rem; color:#C9BE9E}
.home-link{position:fixed; bottom:14px; left:16px; z-index:55; font-size:.72rem; color:#C9BE9E;
  background:rgba(0,0,0,.28); border:1.5px solid rgba(255,255,255,.18); border-radius:10px; padding:6px 12px; text-decoration:none}
.home-link:hover{color:#fff; background:rgba(0,0,0,.42)}

@media(max-width:560px){
  .map{height:min(560px,74vh)}
  .node .disc{width:76px; height:76px; font-size:36px}
  .node.hub .disc{width:92px; height:92px; font-size:44px}
  .hint{display:none}
}
@media(prefers-reduced-motion:reduce){
  .me-marker{transition:none} .node.hub .disc::after{animation:none}
  .travel-emo{animation:none} .busy .dot{animation:none}
}
</style>
</head>
<body>

<!-- ============ HUD ============ -->
<header class="hud">
  <span class="pill-stat"><span class="ic">◗</span><b class="num">96</b></span>
  <span class="pill-stat trust"><span class="ic">★</span><b class="num">84</b></span>
  <span class="spacer"></span>
  <button class="hud-btn" id="btnHome" title="마이스페이스로">🏠</button>
</header>

<!-- ============ 지도 무대 ============ -->
<div class="scene">
  <div class="map" id="map">
    <div class="map-title">🗺️ 바운더리 타운 · 지도</div>
    <div class="map-legend">
      <span class="leg"><span class="sw" style="background:#1BA664"></span>열린 공간</span>
      <span class="leg"><span class="sw" style="background:#4E5968"></span>완강 후 열려요</span>
    </div>

    <!-- 연결선 : 허브(50,52) → 각 노드 -->
    <svg class="paths" viewBox="0 0 1000 640" preserveAspectRatio="none">
      <!-- hub(500,333) → 강의실(230,180) -->
      <path class="road" d="M500 333 Q 360 250 230 180"/><path class="road-d" d="M500 333 Q 360 250 230 180"/>
      <!-- hub → 광장(795,205) -->
      <path class="road" d="M500 333 Q 660 250 795 205"/><path class="road-d" d="M500 333 Q 660 250 795 205"/>
      <!-- hub → 앤더스페이스(720,505) -->
      <path class="road" d="M500 333 Q 640 430 720 505"/><path class="road-d" d="M500 333 Q 640 430 720 505"/>
    </svg>

    <!-- 노드들 : left/top % 는 뷰박스 좌표와 맞춤 -->
    <!-- 🏠 마이스페이스 (허브, 중앙) -->
    <div class="node hub" data-key="myspace" data-href="myspace-prototype.html?mode=full"
         data-label="마이스페이스" data-emo="🏠" style="left:50%; top:52%">
      <div class="disc">🏠</div>
      <div class="node-name">마이스페이스</div>
      <div class="node-sub">내 방 · 허브</div>
    </div>

    <!-- 📺 강의실 (항상 열림) -->
    <div class="node" data-key="lecture" data-href="lecture-prototype.html"
         data-label="강의실" data-emo="📺" style="left:23%; top:28%">
      <div class="lock">🔒</div>
      <div class="tip">완강 후 열려요</div>
      <div class="disc">📺</div>
      <div class="node-name">강의실</div>
      <div class="node-sub">코치와 같이 듣기</div>
    </div>

    <!-- ⛲ 광장 (완강 게이트) -->
    <div class="node" data-key="plaza" data-href="plaza-lobby-prototype.html" data-gated="1"
         data-label="광장" data-emo="⛲" style="left:79.5%; top:32%">
      <div class="lock">🔒</div>
      <div class="tip">완강 후 열려요</div>
      <div class="disc">⛲</div>
      <div class="node-name">광장</div>
      <div class="node-sub">완강자들의 자리</div>
    </div>
    <div class="busy" style="left:90%; top:20%"><span class="dot"></span><span class="dot"></span><span class="dot"></span><small>접속 41</small></div>

    <!-- 🎪 앤더스페이스 (완강 게이트) -->
    <div class="node" data-key="anderspace" data-href="anderspace-prototype.html" data-gated="1"
         data-label="앤더스페이스" data-emo="🎪" style="left:72%; top:79%">
      <div class="lock">🔒</div>
      <div class="tip">완강 후 열려요</div>
      <div class="disc">🎪</div>
      <div class="node-name">앤더스페이스</div>
      <div class="node-sub">또 다른 세계</div>
    </div>

    <!-- 내 위치 마커 (허브 옆에서 시작) -->
    <div class="me-marker" id="me" style="left:45%; top:56%">
      <div class="tag">김이서</div>
      <div class="spr" id="meSpr"></div>
      <div class="shadow"></div>
    </div>
  </div>
</div>

<!-- 이동 연출 -->
<div class="travel" id="travel">
  <div class="travel-box">
    <div class="travel-emo" id="travelEmo">🏠</div>
    <div class="travel-txt" id="travelTxt">이동하는 중…</div>
    <div class="travel-bar"><i id="travelBar"></i></div>
  </div>
</div>

<a class="home-link" href="index.html">← 프로토타입 목록</a>
<div class="hint">노드를 눌러 공간으로 이동해요 · 🔒는 완강 후 열려요</div>
<div class="proto-tag">타운 월드맵 프로토타입 · 목데이터</div>

<script>
/* ================= 픽셀 스프라이트 (내 마커) ================= */
const SPRITE_MAP = [
  '..HHHHHHHH..','.HHHHHHHHHH.','.HHHHHHHHHH.','.HHSSSSSSHH.','..SESSSSES..','..SSSSSSSS..',
  '...SSSSSS...','..TTTTTTTT..','.TTTTTTTTTT.','.TSTTTTTTST.','..TTTTTTTT..','..PPPPPPPP..',
  '..PPP..PPP..','..PPP..PPP..','..DDD..DDD..'
];
const COLORS = {H:'#4A3628', S:'#F2C9A8', E:'#222831', T:'#3182F6', P:'#2B3442', D:'#6E5236'};
(function(){
  const px = 3, sh = [];
  SPRITE_MAP.forEach((row,y)=>[...row].forEach((ch,x)=>{
    const c = COLORS[ch]; if(c) sh.push(`${x*px}px ${y*px}px 0 0 ${c}`);
  }));
  const sp = document.getElementById('meSpr');
  sp.style.boxShadow = sh.join(',');
  sp.style.marginBottom = (15*px) + 'px';
})();

/* ================= 완강 게이트 표시 ================= */
const complete = localStorage.getItem('trus_lecture_complete') === '1';
if(!complete){
  document.querySelectorAll('.node[data-gated="1"]').forEach(n=>n.classList.add('locked'));
}

/* 이름 반영 (있으면) */
const savedName = localStorage.getItem('trus_name');
if(savedName){ document.querySelector('#me .tag').textContent = savedName; }

/* ================= 상단 홈 버튼 ================= */
document.getElementById('btnHome').addEventListener('click', ()=>{
  location.href = 'myspace-prototype.html?mode=full';
});

/* ================= 노드 클릭 → 마커 이동 → 이동 연출 → 이동 ================= */
const me = document.getElementById('me');
const travel = document.getElementById('travel');
const travelEmo = document.getElementById('travelEmo');
const travelTxt = document.getElementById('travelTxt');
const travelBar = document.getElementById('travelBar');
let traveling = false;

function goNode(node){
  if(traveling) return;
  traveling = true;
  const href = node.dataset.href;
  const label = node.dataset.label;
  const emo = node.dataset.emo;

  /* 마커를 노드 위치로 걸어가게 */
  me.classList.add('bob');
  me.style.left = node.style.left;
  me.style.top = 'calc(' + node.style.top + ' + 22px)';

  /* 걷는 시간(0.9s) 뒤 이동 연출 */
  setTimeout(()=>{
    me.classList.remove('bob');
    travelEmo.textContent = emo;
    travelTxt.textContent = label + '(으)로 가는 중…';
    travel.classList.add('show');
    /* 진행 바 채우기 */
    requestAnimationFrame(()=>{ travelBar.style.width = '100%'; });
    setTimeout(()=>{ location.href = href; }, 900);
  }, 900);
}

document.querySelectorAll('.node').forEach(node=>{
  node.setAttribute('role','button');
  node.setAttribute('tabindex','0');
  node.addEventListener('click', ()=>goNode(node));
  node.addEventListener('keydown', e=>{
    if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); goNode(node); }
  });
});
</script>
</body>
</html>
