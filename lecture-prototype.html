<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>바운더리 타운 — 강의실 (프로토타입)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
@font-face{font-family:'NeoDunggeunmo'; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_two@1.0/NeoDunggeunmo.woff') format('woff'); font-display:swap}
:root{
  --ink:#191F28; --paper:#FFF9F1;
  --night:#231B2E; --night-2:#2E2340;
  --accent:#F26D9C; --accent-d:#C24C78; --accent-soft:#FBE4EE;
  --tide:#3182F6; --shell:#F76B1C;
  --muted:#8B95A1; --line:#E8DFD2;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"Pretendard Variable",Pretendard,-apple-system,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  color:var(--ink); letter-spacing:-0.01em; background:var(--night); min-height:100vh; word-break:keep-all;
}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
.num{font-variant-numeric:tabular-nums}
.pxfont, .hud-btn, .pill-stat, .step-label, .pbtn, .sign{font-family:'NeoDunggeunmo','Pretendard Variable',sans-serif; letter-spacing:0}

/* 밤 자습실 배경 — 별 + 창밖 불빛 */
.bg-night{position:fixed; inset:0; pointer-events:none;
  background:linear-gradient(var(--night) 0%, var(--night-2) 100%)}
.bg-night::before{content:""; position:absolute; left:5%; top:6%; width:4px; height:4px; background:#fff; opacity:.7;
  box-shadow:18vw 30px #FFF6C9, 39vw 8px #fff, 57vw 40px #FBE4EE, 74vw 16px #fff, 90vw 34px #C9E9FA, 28vw 70px #fff, 66vw 78px #FFF6C9}
.bg-night::after{content:""; position:absolute; left:0; right:0; bottom:0; height:90px; opacity:.5;
  background:
    linear-gradient(#171130,#171130) 4% 100%/9% 70% no-repeat,
    repeating-linear-gradient(180deg,#F26D9C 0 5px, transparent 5px 14px) 5% 100%/5% 55% no-repeat,
    linear-gradient(#171130,#171130) 84% 100%/9% 84% no-repeat,
    repeating-linear-gradient(180deg,#46D5B2 0 5px, transparent 5px 14px) 85% 100%/5% 66% no-repeat}

/* HUD */
.hud{position:fixed; top:0; left:0; right:0; z-index:60; display:flex; align-items:flex-start; gap:8px; padding:12px 14px; pointer-events:none}
.hud>*{pointer-events:auto}
.hud .spacer{flex:1; pointer-events:none}
.hud-btn{width:42px; height:42px; border-radius:10px; background:#FFF9E9; border:3px solid #17171C; box-shadow:0 3px 0 rgba(0,0,0,.5); font-size:1.1rem; display:flex; align-items:center; justify-content:center}
.hud-btn:active{transform:translateY(2px); box-shadow:0 1px 0 rgba(0,0,0,.5)}
.pill-stat{display:inline-flex; align-items:center; gap:7px; padding:5px 14px 5px 7px; border-radius:16px; background:#F7E9C4; border:3px solid #17171C; box-shadow:0 3px 0 rgba(0,0,0,.5); font-size:.85rem; color:#4A3A18}
.pill-stat .ic{width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:#F2C14E; border:2px solid #B8860B; font-size:.7rem; color:#7A4E00}

/* 무대 */
.stage{width:100%; margin:0 auto; padding:78px 20px 44px; position:relative}
.lesson-col{max-width:640px; margin:0 auto}

/* 라이브 강의실 — 강의자(좌 세로 대형) · 코치2+나(세로 3) · 메모(우 컬럼) */
.liveroom{
  --H:min(760px, 82vh, 48vw);              /* 강의자 세로 높이 */
  --s:calc((var(--H) - 32px)/3);           /* 미니 타일 높이 (3개+간격2 = --H) */
  display:grid; justify-content:center; gap:18px; margin:14px auto 8px;
  grid-template-columns:calc(var(--H)*9/16) calc(var(--s)*16/9) minmax(280px,380px);
}
.vid.main{height:var(--H); aspect-ratio:9/16}
.mid-col{display:flex; flex-direction:column; gap:16px; min-width:0}
.mid-col .vid{height:var(--s)}
.liveroom > .memo{height:var(--H); display:flex; flex-direction:column; overflow:hidden; min-width:0}
.liveroom > .memo .memo-body{flex:1; min-height:0; max-height:none}

/* 좁은 화면: 강의자(세로) → 미니 3개 가로 → 메모 (기본 규칙보다 반드시 뒤) */
@media(max-width:860px){
  .liveroom{display:flex; flex-direction:column}
  .liveroom .vid.main{height:auto; aspect-ratio:9/16; width:min(66vw,300px); align-self:center}
  .mid-col{flex-direction:row}
  .mid-col .vid{height:auto; aspect-ratio:16/9; flex:1; min-width:0}
  .liveroom > .memo{height:auto; min-height:200px}
}
.vid{position:relative; border:3px solid #17171C; border-radius:6px; overflow:hidden; background:#000; box-shadow:4px 4px 0 rgba(0,0,0,.4); aspect-ratio:16/9}
.vid img, .vid video{width:100%; height:100%; object-fit:cover; display:block}
.vid.main{box-shadow:7px 7px 0 rgba(0,0,0,.45)}
.vtag{position:absolute; left:8px; bottom:8px; background:rgba(23,19,31,.88); color:#fff; font-size:.74rem; padding:2px 8px; border-radius:2px; font-family:'NeoDunggeunmo','Pretendard Variable',sans-serif; letter-spacing:0}
.vlive{position:absolute; right:7px; top:7px; width:8px; height:8px; border-radius:50%; background:#FF4D6D; box-shadow:0 0 7px #FF4D6D; animation:blink 1.4s infinite}
.metile{background:#241E33; display:flex; align-items:center; justify-content:center}
.metile img{width:auto !important; height:70% !important; max-height:180px; object-fit:contain}
.spr-box{position:relative; width:48px; height:44px}
.me-sprite{position:absolute; top:0; left:0; width:4px; height:4px; image-rendering:pixelated}
.memo{background:#fff; border:3px solid #17171C; border-radius:6px; box-shadow:4px 4px 0 rgba(0,0,0,.4); min-width:0}
.memo-head{display:flex; align-items:center; gap:6px; padding:10px 12px; border-bottom:2px solid #EFE7D8; font-size:.68rem; font-weight:700; color:#8B95A1}
.memo-head b{margin-left:4px; color:#5A5244}
.mdot{width:8px; height:8px; border-radius:50%}
.mdot.r{background:#FF6B6B}.mdot.y{background:#FFD93D}.mdot.g{background:#6BCB77}
.memo-body{padding:14px 16px; min-height:220px; overflow-y:auto; font-size:.88rem; line-height:1.8; outline:none; color:#3A3428}
.memo-body:empty::before{content:attr(data-ph); color:#B0A793}

/* 강의 재생바 — 섹션이 끝나기 전엔 멈출 수 없어요 */
.vctrl{position:absolute; left:0; right:0; bottom:0; display:flex; align-items:center; gap:10px; padding:22px 12px 9px;
  background:linear-gradient(transparent, rgba(10,8,16,.88))}
.vplay{font-size:1.3rem; color:#fff; flex-shrink:0; filter:drop-shadow(0 0 6px rgba(242,109,156,.6))}
.vprog{flex:1; height:11px; border-radius:5px; background:rgba(255,255,255,.22); cursor:pointer; overflow:hidden}
.vprog i{display:block; height:100%; width:0%; background:linear-gradient(90deg,var(--accent),#FF9DBE); border-radius:5px; transition:width .25s linear}
.vtime{font-size:.85rem; color:#FFD9E8; flex-shrink:0; font-family:'NeoDunggeunmo',sans-serif; letter-spacing:0}

/* 강의 시작 — 소리 있는 재생은 사용자 탭이 필요해요 */
.vstart{position:absolute; inset:0; z-index:6; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:13px; cursor:pointer;
  background:radial-gradient(120% 80% at 50% 40%, rgba(46,35,64,.35), rgba(23,19,31,.72)); backdrop-filter:blur(1.5px);
  color:#FFD9E8; font-family:'NeoDunggeunmo','Pretendard Variable',sans-serif; font-size:.78rem; text-shadow:0 0 8px rgba(242,109,156,.7)}
.vstart.hide{display:none}
.vstart-btn{width:76px; height:76px; border-radius:50%; background:var(--accent); border:3px solid #17131F; color:#fff; font-size:1.9rem;
  display:flex; align-items:center; justify-content:center; padding-left:5px; box-shadow:0 6px 0 var(--accent-d), 0 0 26px rgba(242,109,156,.65); transition:transform .1s}
.vstart:hover .vstart-btn{transform:scale(1.06)}
.vstart:active .vstart-btn{transform:translateY(3px); box-shadow:0 3px 0 var(--accent-d), 0 0 26px rgba(242,109,156,.65)}
/* 섹션 종료 선택 */
.sec-overlay{position:fixed; inset:0; z-index:80; background:rgba(20,15,28,.72); backdrop-filter:blur(4px); display:none; align-items:center; justify-content:center}
.sec-overlay.show{display:flex}
.sec-card{background:var(--paper); border:3px solid #17171C; border-radius:8px; box-shadow:8px 8px 0 rgba(0,0,0,.5); padding:30px 32px; text-align:center; width:min(420px,90vw); animation:rise .3s ease}
.sec-card .se{font-size:44px; margin-bottom:10px}
.sec-card h2{font-size:1.3rem; font-weight:800; letter-spacing:-0.03em; margin-bottom:8px}
.sec-card p{font-size:.86rem; color:#7A7264; line-height:1.65; margin-bottom:20px}
.sec-card .btns{display:flex; flex-direction:column; gap:9px}
.sec-card.wide{width:min(720px,94vw); text-align:left}
.ao-grid{display:grid; grid-template-columns:minmax(0,1fr) 230px; gap:14px; align-items:start}
@media(max-width:640px){.ao-grid{grid-template-columns:1fr}}
.ao-peers{display:flex; flex-direction:column; gap:10px}
.pc-cap{font-size:.7rem; font-weight:800; color:#A8834A}
.peer-card{border:2px solid #17171C; border-radius:6px; background:#FDF8EC; padding:9px 11px}
.pc-name{font-size:.66rem; font-weight:700; color:#C24C78; display:flex; align-items:center; gap:6px; margin-bottom:6px}
.pc-live{width:6px; height:6px; border-radius:50%; background:#FF4D6D; animation:blink 1.4s infinite}
.pc-svg{display:block; width:100%; background:#fff; border-radius:4px; border:1px solid #E8DFD2}
.pc-svg path{stroke-dasharray:340; stroke-dashoffset:340; animation:drawpath 2.8s ease forwards}
@keyframes drawpath{to{stroke-dashoffset:0}}
.pc-text{font-size:.76rem; line-height:1.6; color:#5A5244; min-height:40px}
.pc-text::after{content:"▌"; color:#C24C78; animation:blink 1s infinite}
.ao-ta{width:100%; font:inherit; font-size:.92rem; border:3px solid #17171C; border-radius:6px; padding:12px 14px; background:#fff; min-height:120px; resize:vertical; line-height:1.7}
.ao-ta:focus{outline:3px solid var(--accent-soft)}
.sec-card.wide .gate{margin-top:16px}
.pbtn.gray{background:#8B95A1; border-color:#6B7684; box-shadow:0 4px 0 #6B7684}
.pbtn.gray:active{box-shadow:0 1px 0 #6B7684}
.pbtn.center{justify-content:center; width:100%}

.vsec{position:absolute; left:10px; top:10px; background:rgba(23,19,31,.88); color:#fff; font-size:.78rem; padding:3px 9px; border-radius:2px; font-family:'NeoDunggeunmo','Pretendard Variable',sans-serif; letter-spacing:0}
.sign{text-align:center; margin:2px 0 22px}
.sign .board{display:inline-flex; align-items:center; gap:9px; padding:10px 20px; border-radius:13px;
  background:rgba(23,19,31,.82); border:2px solid #3E3155; color:#FFE6F0;
  font-size:clamp(1.15rem,2.7vw,1.45rem); letter-spacing:0;
  box-shadow:0 3px 0 rgba(0,0,0,.45), 0 0 22px rgba(242,109,156,.28)}
.sign small{display:block; font-size:.82rem; color:#B7AACB; text-shadow:none; margin-top:11px; font-family:"Pretendard Variable",sans-serif; letter-spacing:-0.01em}

/* 진행 오브 레일 */
.rail{display:flex; align-items:center; justify-content:center; gap:8px; margin:16px 0 22px}
.orb{width:26px; height:26px; border-radius:50%; border:3px solid #17171C; background:#3A2E4E; position:relative; overflow:hidden; flex-shrink:0}
.orb i{position:absolute; left:0; right:0; bottom:0; height:0; background:linear-gradient(180deg,var(--accent),#FF9DBE); transition:height .5s ease}
.orb.done i{height:100%}
.orb.cur{border-color:#FFD9E8; box-shadow:0 0 10px rgba(242,109,156,.6)}
.rail .bar{width:14px; height:3px; background:#3A2E4E}

/* 함께 듣는 친구들 */
.classmates{display:flex; align-items:center; justify-content:center; gap:8px; flex-wrap:wrap; margin:-8px 0 18px}
.cm-live{display:inline-flex; align-items:center; gap:6px; font-size:.7rem; font-weight:700; color:#FFD9E8; background:#17131F; border:2px solid #0B0912; border-radius:3px; padding:4px 10px}
.cm-live .dot{width:7px; height:7px; border-radius:50%; background:#FF4D6D; animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.cm{display:inline-flex; align-items:center; gap:6px; font-size:.7rem; color:#D8CFE8; background:rgba(255,255,255,.08); border:2px solid rgba(11,9,18,.6); border-radius:3px; padding:4px 10px}
.cm .av{width:16px; height:16px; border-radius:50%; border:2px solid #17131C}
.cm b{color:#fff; font-weight:700}
.cm.done{opacity:.65}

/* 흔적 — 먼저 지나간 친구가 남긴 것 */
.trace{margin-top:14px; border:2px dashed #E0CFA8; border-radius:6px; background:#FDF8EC; padding:11px 14px}
.trace .t-label{font-size:.7rem; font-weight:800; color:#A8834A; margin-bottom:6px}
.trace p{font-size:.82rem; color:#5A5244; line-height:1.6}
.trace .peer{font-size:.85rem; font-weight:600; background:#fff; border:2px solid #17171C; border-radius:5px; padding:9px 12px; margin-top:6px; transition:filter .5s}
.trace .peer.blur{filter:blur(5px); user-select:none}
.trace svg{display:block; margin-top:4px}

/* 코치 실시간 대화 */
.cochat{margin-top:14px; background:#17131F; border:3px solid #0B0912; border-radius:6px; padding:10px 12px; max-height:132px; overflow-y:auto; display:flex; flex-direction:column; gap:7px}
.cochat:empty{display:none}
.co-msg{display:flex; gap:8px; align-items:flex-start; font-size:.78rem; color:#D8CFE8; line-height:1.5; animation:coin .3s ease}
@keyframes coin{from{opacity:0; transform:translateY(6px)}to{opacity:1; transform:none}}
.co-msg .co-av{flex-shrink:0; font-size:15px}
.co-msg .co-who{display:block; font-size:.64rem; font-weight:700; color:#FF9DBE; margin-bottom:1px}
.co-msg svg{background:#fff; border-radius:4px; padding:2px; margin-top:2px}

/* 게이트 통과 응원 */
.cheer{position:fixed; z-index:95; font-size:.85rem; font-weight:700; background:#fff; border:2px solid #17131F; border-radius:4px; padding:7px 13px; box-shadow:3px 3px 0 rgba(0,0,0,.35); animation:cheerup 2.2s ease forwards; pointer-events:none}
@keyframes cheerup{0%{opacity:0; transform:translateY(14px)}15%{opacity:1; transform:none}80%{opacity:1}100%{opacity:0; transform:translateY(-22px)}}

/* 스텝 카드 */
.card{
  background:var(--paper); border:3px solid #17171C; border-radius:8px;
  box-shadow:8px 8px 0 rgba(0,0,0,.45); padding:26px 26px 24px; position:relative;
  animation:rise .4s ease;
}
@keyframes rise{from{opacity:0; transform:translateY(16px)}to{opacity:1; transform:none}}
.step-label{font-size:.72rem; color:var(--accent-d); margin-bottom:10px}
.card h1{font-size:clamp(1.25rem,4vw,1.6rem); font-weight:800; letter-spacing:-0.03em; line-height:1.35; margin-bottom:6px}
.lede{font-size:.86rem; color:#7A7264; line-height:1.6; margin-bottom:18px}

/* 게이트 푸터 */
.gate{display:flex; align-items:center; gap:12px; margin-top:20px; padding-top:16px; border-top:2px dashed var(--line)}
.gate .hint{font-size:.8rem; color:var(--muted); flex:1}
.gate .hint.ready{color:var(--accent-d); font-weight:700}
.pbtn{display:inline-flex; align-items:center; gap:6px; font-size:.85rem; padding:10px 20px; border-radius:5px; background:var(--accent); color:#fff; border:2px solid var(--accent-d); box-shadow:0 4px 0 var(--accent-d); transition:transform .08s, box-shadow .08s, opacity .2s}
.pbtn:active{transform:translateY(3px); box-shadow:0 1px 0 var(--accent-d)}
.pbtn:disabled{opacity:.35; cursor:not-allowed; transform:none}

/* 01 영상 */
.tv{background:#17131F; border:3px solid #0B0912; border-radius:6px; aspect-ratio:16/9; position:relative; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px; overflow:hidden}
.tv .quote{color:#D8CFE8; font-size:.95rem; text-align:center; padding:0 30px; line-height:1.7}
.tv .playbtn{font-size:46px; color:#FFD9E8; filter:drop-shadow(0 0 10px rgba(242,109,156,.7)); transition:transform .15s}
.tv .playbtn:hover{transform:scale(1.12)}
.tv .vbar{position:absolute; bottom:0; left:0; right:0; height:6px; background:rgba(255,255,255,.12)}
.tv .vbar i{display:block; height:100%; width:0; background:var(--accent)}

/* 02 그리기 */
.padwrap{border:3px solid #17171C; border-radius:6px; background:#fff; overflow:hidden}
canvas{display:block; width:100%; height:200px; touch-action:none; cursor:crosshair}
.colors{display:flex; gap:8px; margin-top:12px}
.colors button{width:30px; height:30px; border-radius:50%; border:3px solid transparent}
.colors button.sel{border-color:#17171C}

/* 03 읽기 */
.reader{border:3px solid #17171C; border-radius:6px; background:#fff; height:220px; overflow-y:auto; padding:18px 20px}
.reader p{font-size:.88rem; line-height:1.85; color:#3A3428; margin-bottom:14px}
.reader p b{background:linear-gradient(transparent 58%, #FFE0A3 58%)}
.reader p.sent{cursor:pointer; border-radius:4px; padding:2px 4px; margin-left:-4px}
.reader p.sent:hover{background:#FFF6E4}
.reader p.my-ul{background:linear-gradient(transparent 62%, #FFE0A3 62%)}
.reader p.friend-ul{border-bottom:2px dotted var(--accent)}
.reader .ful{display:block; font-size:.68rem; color:var(--accent-d); margin-top:4px; font-weight:700}

/* 04 말하기 */
.say{background:#fff; border:3px solid #17171C; border-radius:6px; padding:22px; text-align:center}
.say .line{font-family:inherit; font-size:1.05rem; line-height:1.8; margin-bottom:18px}
.holdbtn{font-size:.9rem; font-weight:700; padding:14px 26px; border-radius:50px; background:var(--accent-soft); color:var(--accent-d); border:3px solid var(--accent-d); position:relative; overflow:hidden; user-select:none}
.holdbtn .fill{position:absolute; left:0; top:0; bottom:0; width:0; background:rgba(242,109,156,.35)}
.holdbtn span{position:relative}

/* 05 PLAY */
.playbox textarea{width:100%; font-family:inherit; font-size:1rem; border:3px solid #17171C; border-radius:6px; padding:14px 16px; background:#fff; min-height:110px; resize:vertical; line-height:1.8}
.playbox textarea:focus{outline:3px solid var(--accent-soft)}

/* 06 마무리 */
.fin .field{margin-bottom:12px}
.fin label{display:block; font-size:.74rem; font-weight:700; color:#7A7264; margin-bottom:6px}
.fin input{width:100%; font-family:inherit; font-size:.95rem; border:3px solid #17171C; border-radius:6px; padding:12px 14px; background:#fff}
.fin .chk{display:flex; align-items:center; gap:9px; font-size:.85rem; margin-top:6px}
.fin .chk input{width:18px; height:18px; accent-color:var(--accent)}

/* 완료 */
.done-wrap{text-align:center; padding:14px 0 6px}
.done-orb{width:110px; height:110px; border-radius:50%; margin:0 auto 18px; border:4px solid #17171C; position:relative; overflow:hidden; background:#fff}
.done-orb i{position:absolute; left:-10%; right:-10%; bottom:0; height:0; background:linear-gradient(180deg,var(--accent),#FF9DBE); transition:height 1.2s ease; border-radius:40% 45% 0 0}
.done-orb.fill i{height:105%}
.done-orb .emo{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:44px}
.done-wrap h1{margin-bottom:8px}
.done-wrap .sub{font-size:.86rem; color:#7A7264; line-height:1.7; margin-bottom:18px}
.outdots{display:flex; justify-content:center; gap:7px; margin:0 0 18px}
.outdots span{width:30px; height:30px; border-radius:50%; border:3px solid #17171C; background:#F2EBDD; display:flex; align-items:center; justify-content:center; font-size:.75rem; color:#B0A793}
.outdots span.on{background:var(--accent); color:#fff}

.toast{position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(90px); z-index:90;
  background:#17131F; color:#FFF; border:2px solid #0B0912; font-size:.82rem; font-weight:600;
  padding:11px 20px; border-radius:4px; box-shadow:4px 4px 0 rgba(0,0,0,.4); transition:transform .25s ease; text-align:center; max-width:90vw}
.toast.show{transform:translateX(-50%) translateY(0)}
@media(prefers-reduced-motion:reduce){.card{animation:none}}
</style>
</head>
<body>
<div class="bg-night"></div>

<header class="hud">
  <button class="hud-btn" onclick="location.href='myspace-prototype.html'" title="마이스페이스로">🏠</button>
  <span class="spacer"></span>
  <span class="pill-stat"><span class="ic">◗</span><b class="num">96</b></span>
</header>

<div class="stage">
  <div class="sign pxfont"><span class="board">📺 강의실 — 전략 설정</span><small>커리큘럼 5단계 중 마지막 · 일의 교과서</small></div>
  <div class="liveroom">
    <div class="vid main">
      <video id="lecVid" src="assets/lecture.mp4" poster="assets/lecture-poster.jpg" playsinline preload="metadata"></video>
      <span class="vsec" id="vSec">1/9 · 오늘, 잠깐 멈추는 시간</span>
      <span class="vlive"></span>
      <div class="vctrl">
        <button class="vplay" id="vPlay">▶</button>
        <div class="vprog" id="vProg"><i id="vFill"></i></div>
        <span class="vtime num" id="vTime">-0:00</span>
      </div>
      <span class="vtag" style="bottom:44px">윤소정 · 강의</span>
      <div class="vstart" id="vStart">
        <button class="vstart-btn">▶</button>
        <span>탭하여 강의 시작 · 소리 켜짐 🔊</span>
      </div>
    </div>
    <div class="mid-col">
      <div class="vid"><img src="assets/left1.png" alt="코치"><span class="vtag">🦉 바운더리 코치</span><span class="vlive"></span></div>
      <div class="vid"><img src="assets/left2.png" alt="코치"><span class="vtag">🐢 기록 코치</span><span class="vlive"></span></div>
      <div class="vid metile"><img src="assets/char1.png" alt="" style="image-rendering:pixelated"><span class="vtag">나 · 김이서</span></div>
    </div>
    <div class="memo">
      <div class="memo-head"><span class="mdot r"></span><span class="mdot y"></span><span class="mdot g"></span><b>내 메모</b></div>
      <div class="memo-body" id="memoBody" contenteditable="true" data-ph="수업 들으며 자유롭게 적어요…"></div>
    </div>
  </div>

  <div class="lesson-col" id="doneHost"></div>
</div>

<div class="sec-overlay" id="secOverlay">
  <div class="sec-card">
    <div class="se" id="soEmo">🎬</div>
    <h2 id="soTitle">섹션 1 끝!</h2>
    <p id="soText">다음 섹션으로 넘어갈까요?<br>아직 학습이 더 필요하다면, 다시 들어볼 수도 있어요.</p>
    <div class="btns">
      <button class="pbtn center" id="soNext">다음 섹션으로 →</button>
      <button class="pbtn center gray" id="soReplay">🔁 다시 들어볼래요</button>
    </div>
  </div>
</div>

<div class="sec-overlay" id="actOverlay">
  <div class="sec-card wide">
    <div class="step-label" id="aoLabel"></div>
    <h2 id="aoTitle"></h2>
    <p id="aoText" style="text-align:left; margin-bottom:14px"></p>
    <div id="aoBody"></div>
    <div class="gate"><span class="hint" id="aoHint"></span>
    <button class="pbtn" id="aoDone" disabled>완료 — 이어서 듣기 ›</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ─── 노션풍 메모 저장 ─── */
(function(){
  const memo = document.getElementById('memoBody');
  memo.innerText = localStorage.getItem('trus_memo') || '';
  memo.addEventListener('input', ()=>localStorage.setItem('trus_memo', memo.innerText));
})();

/* ─── 강의 흐름 — 8개 블록 (강의 에디터에서 조립하는 구조) ─── */
/* 에디터 규칙: 인터랙티브 블록은 반드시 강의 블록 바로 뒤에만 올 수 있어요 */
const BLOCKS = [
  {type:'lecture', name:'강의', t:'오늘, 잠깐 멈추는 시간', dur:5},
  {type:'gate', name:'섹션 넘어가기'},
  {type:'lecture', name:'강의', t:'끝까지 생각하는 훈련 — 키 씬', dur:5},
  {type:'interactive', kind:'draw', name:'인터랙티브 — 그림 그리기', t:'지금 마음을 색으로 그려보세요'},
  {type:'lecture', name:'강의', t:'단 한 컷을 고른다면', dur:5},
  {type:'gate', name:'섹션 넘어가기'},
  {type:'lecture', name:'강의', t:'전략을 바운더리로', dur:5},
  {type:'interactive', kind:'write', name:'인터랙티브 — 글쓰기', t:'오늘 배운 것을 한 문장으로 적어보세요', ph:'오늘 나는 …라는 걸 알았다.'},
  {type:'finish', name:'마무리 · 다시 듣기'},
];
BLOCKS.forEach((b,i)=>{
  if(b.type==='interactive' && (i===0 || BLOCKS[i-1].type!=='lecture'))
    console.warn(`에디터 규칙 위반: 블록 ${i+1} 인터랙티브 앞에는 강의가 있어야 해요`);
});

let bi = 0, done = false, started = false;
const fmt = s => Math.floor(s/60) + ':' + String(Math.max(0,Math.round(s))%60).toString().padStart(2,'0');
const $ = id => document.getElementById(id);

/* ─── 실제 강의 영상 (세로 9:16) ─── */
const lecVid = $('lecVid');
let VID_DUR = 66;                                       // 로드되면 실제 길이로 갱신
const lectureIdx = BLOCKS.map((b,i)=> b.type==='lecture' ? i : -1).filter(i=>i>=0);
function segOf(blockIdx){                               // 강의 블록 → 영상 구간
  const k = lectureIdx.indexOf(blockIdx);
  const len = VID_DUR / lectureIdx.length;
  return { start:k*len, end:(k+1)*len, len };
}
lecVid.addEventListener('loadedmetadata', ()=>{
  if(isFinite(lecVid.duration) && lecVid.duration > 0){ VID_DUR = lecVid.duration; updateUI(); }
});

function updateUI(){
  const b = BLOCKS[bi];
  $('vSec').textContent = `${bi+1}/${BLOCKS.length} · ${b.type==='lecture' ? b.t : b.name}`;
  if(b.type==='lecture'){
    const seg = segOf(bi);
    const cur = Math.min(Math.max(lecVid.currentTime, seg.start), seg.end);
    $('vFill').style.width = ((cur - seg.start)/seg.len*100) + '%';
    $('vTime').textContent = '-' + fmt(seg.end - cur);
  }
}
function runBlock(){
  const b = BLOCKS[bi];
  updateUI();
  if(b.type==='lecture'){ playLecture(); }
  else { lecVid.pause(); $('vPlay').textContent = '▶'; }
  if(b.type==='gate') showGate(false);
  if(b.type==='interactive') showInteractive(b);
  if(b.type==='finish') showGate(true);
}
function playLecture(){
  const seg = segOf(bi);
  if(lecVid.currentTime < seg.start - 0.3 || lecVid.currentTime >= seg.end - 0.05)
    lecVid.currentTime = seg.start;                    // 이 섹션 구간 시작으로
  updateUI();
  if(started){ lecVid.play().catch(()=>{}); $('vPlay').textContent = '⏸'; }
}
/* 영상 재생에 맞춰 진행바·남은시간 갱신, 구간 끝나면 다음 블록으로 */
lecVid.addEventListener('timeupdate', ()=>{
  if(BLOCKS[bi].type !== 'lecture') return;
  const seg = segOf(bi);
  updateUI();
  if(lecVid.currentTime >= seg.end - 0.06){ lecVid.pause(); nextBlock(); }
});
function nextBlock(){
  if(bi >= BLOCKS.length - 1) return;
  bi++; runBlock();
}

/* 첫 재생은 사용자 탭이 있어야 소리와 함께 시작돼요 */
$('vStart').addEventListener('click', ()=>{
  started = true;
  lecVid.muted = false;
  $('vStart').classList.add('hide');
  playLecture();
});
/* 재생/일시정지 — 실제 영상 제어 */
$('vPlay').addEventListener('click', ()=>{
  if(!started){ $('vStart').click(); return; }
  if(done || BLOCKS[bi].type !== 'lecture') return;
  if(lecVid.paused){ lecVid.play().catch(()=>{}); $('vPlay').textContent = '⏸'; }
  else { lecVid.pause(); $('vPlay').textContent = '▶'; }
});
/* 진행바 클릭 — 현재 섹션 구간 안에서만 이동 (앞 섹션은 못 건너뛰어요) */
$('vProg').addEventListener('click', e=>{
  if(!started || done || BLOCKS[bi].type !== 'lecture') return;
  const seg = segOf(bi);
  const r = e.currentTarget.getBoundingClientRect();
  const frac = Math.min(1, Math.max(0, (e.clientX - r.left)/r.width));
  lecVid.currentTime = seg.start + frac*seg.len;
  updateUI();
});

/* 섹션 넘어가기 · 마무리 화면 */
let gateMode = 'gate';
function showGate(isFinish){
  gateMode = isFinish ? 'finish' : 'gate';
  $('soEmo').textContent = isFinish ? '🎓' : '🎬';
  $('soTitle').textContent = isFinish ? '마지막 섹션까지 다 들었어요!' : '여기까지 잘 들었어요!';
  $('soText').innerHTML = isFinish
    ? '이대로 강의를 마무리할까요?<br>아직 학습이 더 필요하다면, 처음부터 다시 들을 수도 있어요.'
    : '다음 섹션으로 넘어갈까요?<br>아직 학습이 더 필요하다면, 다시 들어볼 수도 있어요.';
  $('soNext').textContent = isFinish ? '🎓 강의 마무리하기' : '다음 섹션으로 →';
  $('soReplay').textContent = isFinish ? '🔁 처음부터 다시 듣기' : '🔁 다시 들어볼래요';
  $('secOverlay').classList.add('show');
}
$('soNext').addEventListener('click', ()=>{
  $('secOverlay').classList.remove('show');
  if(gateMode === 'finish'){ finishLecture(); return; }
  nextBlock();
});
$('soReplay').addEventListener('click', ()=>{
  $('secOverlay').classList.remove('show');
  if(gateMode === 'finish'){ bi = 0; runBlock(); toast('처음부터 다시 — 두 번째가 진짜예요'); return; }
  bi = Math.max(0, bi - 1); runBlock();
  toast('처음부터 다시 — 천천히 들어도 괜찮아요');
});

/* 인터랙티브 학습 구간 — 각자 하는 화면이 옆에 실시간처럼 보여요 */
const PEER_DRAWS = [
  {n:'🦉 바운더리 코치', c:'#E86CA8', d:'M8 40 C 30 8, 52 46, 74 18 S 118 40, 150 12'},
  {n:'🐢 기록 코치', c:'#46D5B2', d:'M8 20 C 34 44, 60 10, 86 34 S 130 16, 150 36'},
];
const PEER_WRITES = [
  {n:'🦉 바운더리 코치', text:'오늘 나는, 끝점을 한 문장으로 줄이는 법을 배웠다.'},
  {n:'🐢 기록 코치', text:'내일 아침엔 키 씬부터 다시 그려봐야지.'},
];
function showInteractive(b){
  $('aoLabel').textContent = `${bi+1}/${BLOCKS.length} · ${b.name}`;
  $('aoTitle').textContent = b.t;
  $('aoText').textContent = b.kind==='draw'
    ? '정답은 없어요. 손 가는 대로 조금만 그리면 이어서 들을 수 있어요.'
    : '한 문장이면 충분해요. 솔직한 문장이 제일 좋아요.';
  const task = b.kind==='draw'
    ? `<div class="padwrap"><canvas id="pad"></canvas></div>
       <div class="colors" id="colors">
         <button class="sel" style="background:#F26D9C"></button><button style="background:#3182F6"></button>
         <button style="background:#46D5B2"></button><button style="background:#F2C14E"></button><button style="background:#2B2B33"></button>
       </div>`
    : `<textarea class="ao-ta" id="aoTa" placeholder="${b.ph}"></textarea>`;
  const src = b.kind==='draw' ? PEER_DRAWS : PEER_WRITES;
  const peers = src.map((pr,i)=> b.kind==='draw'
    ? `<div class="peer-card"><div class="pc-name">${pr.n}<span class="pc-live"></span></div><svg viewBox="0 0 158 52" class="pc-svg"><path d="${pr.d}" fill="none" stroke="${pr.c}" stroke-width="5" stroke-linecap="round" style="animation-delay:${i*1.4}s"/></svg></div>`
    : `<div class="peer-card"><div class="pc-name">${pr.n}<span class="pc-live"></span></div><p class="pc-text" data-full="${pr.text}"></p></div>`
  ).join('');
  $('aoBody').innerHTML = `<div class="ao-grid"><div>${task}</div><div class="ao-peers"><div class="pc-cap">👀 지금 각자 하는 중</div>${peers}</div></div>`;
  const h = $('aoHint');
  h.textContent = b.kind==='draw' ? '조금이라도 그리면 완료돼요' : '한 문장을 적으면 완료돼요';
  h.classList.remove('ready');
  $('aoDone').disabled = true;
  $('actOverlay').classList.add('show');
  if(b.kind==='draw') setTimeout(initPad, 60);
  else{
    const ta = $('aoTa');
    setTimeout(()=>ta.focus(), 60);
    ta.addEventListener('input', ()=>{
      if(ta.value.trim().length >= 8){ $('aoDone').disabled = false; h.textContent = '좋아요! 완료할 수 있어요'; h.classList.add('ready'); }
    });
  }
  document.querySelectorAll('.pc-text').forEach((el,i)=>{
    const full = el.dataset.full; let k = 0;
    setTimeout(()=>{
      const t = setInterval(()=>{ el.textContent = full.slice(0, ++k); if(k >= full.length) clearInterval(t); }, 90);
    }, 900 + i*1600);
  });
}
function initPad(){
  const cv = $('pad');
  const r = cv.getBoundingClientRect(); cv.width = r.width * 2; cv.height = 400;
  const ctx = cv.getContext('2d'); ctx.scale(2,2); ctx.lineWidth = 6; ctx.lineCap = 'round'; ctx.strokeStyle = '#F26D9C';
  let drawing = false, drew = 0;
  const pos = e => { const b = cv.getBoundingClientRect(); const t = e.touches ? e.touches[0] : e; return [t.clientX - b.left, t.clientY - b.top]; };
  const start = e => { drawing = true; const [x,y] = pos(e); ctx.beginPath(); ctx.moveTo(x,y); e.preventDefault(); };
  const move = e => {
    if(!drawing) return;
    const [x,y] = pos(e); ctx.lineTo(x,y); ctx.stroke();
    if(++drew === 12){
      $('aoDone').disabled = false;
      const h = $('aoHint'); h.textContent = '예쁘네요! 완료할 수 있어요'; h.classList.add('ready');
    }
    e.preventDefault();
  };
  cv.addEventListener('mousedown', start); cv.addEventListener('mousemove', move);
  window.onmouseup = ()=>drawing=false;
  cv.addEventListener('touchstart', start); cv.addEventListener('touchmove', move); cv.addEventListener('touchend', ()=>drawing=false);
  document.querySelectorAll('#colors button').forEach(btn=>btn.addEventListener('click', ()=>{
    document.querySelectorAll('#colors button').forEach(x=>x.classList.remove('sel'));
    btn.classList.add('sel'); ctx.strokeStyle = btn.style.background;
  }));
}
$('aoDone').addEventListener('click', ()=>{
  $('actOverlay').classList.remove('show');
  toast(BLOCKS[bi].kind==='draw' ? '그림이 남았어요 — 코치들도 볼 수 있어요' : '문장이 남았어요 — 코치들도 볼 수 있어요');
  nextBlock();
});

/* 완강 */
function finishLecture(){
  done = true;
  lecVid.pause();
  localStorage.setItem('trus_lecture_complete','1');
  $('vPlay').textContent = '✓';
  $('vTime').textContent = '끝';
  $('doneHost').innerHTML = `<div class="card done-wrap">
    <div class="done-orb" id="dorb"><i></i><span class="emo">🎓</span></div>
    <h1>일의 프레임이 완성됐어요 — 완강!</h1>
    <div class="outdots"><span class="on">✓</span><span class="on">✓</span><span class="on">✓</span><span class="on">✓</span><span class="on">✓</span></div>
    <p class="sub">다섯 조각이 모두 채워져 나만의 일의 프레임이 됐어요.</p>
    <div style="margin:0 0 16px; padding:12px 16px; border:3px solid #17171C; border-radius:6px; background:#FBE4EE; font-size:.85rem; font-weight:700; color:#8A2D55; box-shadow:3px 3px 0 rgba(0,0,0,.15)">
      📦 오프라인 책 『일의 교과서』가 집으로 출발했어요<br><span style="font-weight:500; font-size:.76rem">여정을 끝낸 사람에게만 오는 졸업장이에요</span></div>
    <div style="margin:0 0 16px; padding:12px 16px; border:3px solid #17171C; border-radius:6px; background:#E7F6EE; font-size:.85rem; font-weight:700; color:#1F5D3A; box-shadow:3px 3px 0 rgba(0,0,0,.15)">
      ⛲ 광장 문이 열렸어요!<br><span style="font-weight:500; font-size:.76rem">광장은 100% 완강한 사람들만 들어갈 수 있는 공간이에요</span></div>
    <div style="display:flex; gap:8px; justify-content:center; flex-wrap:wrap">
      <button class="pbtn" onclick="location.href='plaza-prototype.html'">⛲ 광장 입장하기</button>
      <button class="pbtn" style="background:#8B95A1; border-color:#6B7684; box-shadow:0 4px 0 #6B7684" onclick="location.href='myspace-prototype.html'">🏠 마이스페이스로</button>
    </div>
  </div>`;
  setTimeout(()=>$('dorb').classList.add('fill'), 100);
  toast('전체 섹션 100% 완강 — 광장이 열렸어요 ◗ +1');
  $('doneHost').scrollIntoView({behavior:'smooth'});
}

function toast(msg){
  const t = $('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove('show'), 3000);
}

runBlock();
</script>
</body>
</html>
