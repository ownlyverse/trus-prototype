<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>바운더리 타운 — 광장 로비</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
@font-face{font-family:'NeoDunggeunmo'; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_two@1.0/NeoDunggeunmo.woff') format('woff'); font-display:swap}
:root{
  --ink:#191F28; --paper:#FFF9F1;
  --night:#231B2E; --night-2:#2E2340;
  --accent:#F26D9C; --accent-d:#C24C78; --accent-soft:#FBE4EE;
  --tide:#3182F6; --shell:#F76B1C;
  --muted:#8B95A1; --line:#E8DFD2;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Pretendard Variable",Pretendard,-apple-system,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  color:var(--ink); letter-spacing:-0.01em; background:var(--night); min-height:100vh; word-break:keep-all}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}
.pxfont, .hud-btn, .pill-stat, .sign .board, .pbtn, .p-slug, .status .st{font-family:'NeoDunggeunmo','Pretendard Variable',sans-serif; letter-spacing:0}

/* 밤 배경 — 별 + 창밖 불빛 (강의실과 동일) */
.bg-night{position:fixed; inset:0; pointer-events:none; z-index:0;
  background:linear-gradient(var(--night) 0%, var(--night-2) 100%)}
.bg-night::before{content:""; position:absolute; left:5%; top:6%; width:4px; height:4px; background:#fff; opacity:.7;
  box-shadow:18vw 30px #FFF6C9, 39vw 8px #fff, 57vw 40px #FBE4EE, 74vw 16px #fff, 90vw 34px #C9E9FA, 28vw 70px #fff, 66vw 78px #FFF6C9, 12vw 120px #fff, 48vw 150px #FFF6C9, 82vw 130px #FBE4EE}
.bg-night::after{content:""; position:absolute; left:0; right:0; bottom:0; height:90px; opacity:.5;
  background:
    linear-gradient(#171130,#171130) 4% 100%/9% 70% no-repeat,
    repeating-linear-gradient(180deg,#F26D9C 0 5px, transparent 5px 14px) 5% 100%/5% 55% no-repeat,
    linear-gradient(#171130,#171130) 84% 100%/9% 84% no-repeat,
    repeating-linear-gradient(180deg,#46D5B2 0 5px, transparent 5px 14px) 85% 100%/5% 66% no-repeat}

/* HUD (강의실과 동일) */
.hud{position:fixed; top:0; left:0; right:0; z-index:60; display:flex; align-items:center; gap:8px; padding:12px 14px}
.hud .spacer{flex:1}
.hud-btn{width:44px; height:44px; border-radius:50%; background:rgba(23,19,31,.82); border:2px solid #3E3155; color:#FFE6F0; font-size:20px;
  box-shadow:0 3px 12px rgba(0,0,0,.4), 0 0 18px rgba(242,109,156,.14); display:flex; align-items:center; justify-content:center;
  transition:transform .1s, box-shadow .1s, border-color .12s}
.hud-btn:hover{border-color:#F26D9C; box-shadow:0 3px 12px rgba(0,0,0,.4), 0 0 22px rgba(242,109,156,.35)}
.hud-btn:active{transform:translateY(2px)}
.pill-stat{display:inline-flex; align-items:center; gap:8px; padding:6px 16px 6px 6px; border-radius:22px;
  background:rgba(23,19,31,.82); border:2px solid #3E3155; color:#FFE6F0; font-size:.92rem; font-weight:700;
  box-shadow:0 3px 12px rgba(0,0,0,.4), 0 0 18px rgba(242,109,156,.14)}
.pill-stat .ic{width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg,#FFE08A,#F2A73C); border:1px solid #C98A2E; font-size:.82rem; color:#7A4E00;
  box-shadow:inset 0 1px 2px rgba(255,255,255,.55)}

/* 무대 */
.stage{position:relative; z-index:1; padding:74px 20px 60px}
.lesson-col{max-width:660px; margin:0 auto}

/* 사인 (강의실 board) */
.sign{text-align:center; margin:2px 0 10px}
.sign .board{display:inline-flex; align-items:center; gap:9px; padding:10px 20px; border-radius:13px;
  background:rgba(23,19,31,.82); border:2px solid #3E3155; color:#FFE6F0;
  font-size:clamp(1.15rem,2.7vw,1.45rem); box-shadow:0 3px 0 rgba(0,0,0,.45), 0 0 22px rgba(242,109,156,.28)}
.sign small{display:block; font-size:.84rem; color:#B7AACB; margin-top:12px; line-height:1.6}
.sign small b{color:#FFD9E8}

/* 상태칩 */
.status{display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:14px 0 4px}
.status .st{font-size:.72rem; font-weight:700; color:#D8CFE8; background:rgba(255,255,255,.08); border:2px solid rgba(11,9,18,.5); border-radius:4px; padding:5px 11px}
.status .st b{color:#fff}

/* 광장 박스 그리드 */
@keyframes rise{from{opacity:0; transform:translateY(16px)}to{opacity:1; transform:none}}
.plaza-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(212px,1fr)); gap:20px; margin-top:30px}
.pbox{position:relative; background:var(--paper); border:3px solid #17171C; border-radius:12px;
  box-shadow:5px 5px 0 rgba(0,0,0,.4); padding:22px 18px 18px; cursor:pointer; text-align:center;
  transition:transform .12s; animation:rise .4s ease both}
.pbox:hover{transform:translateY(-4px)}
/* 추천 광장 — 테두리가 은은히 빛남 */
.pbox.rec{border-color:var(--accent-d); animation:rise .4s ease both, recglow 1.9s ease-in-out .4s infinite}
@keyframes recglow{
  0%,100%{box-shadow:5px 5px 0 rgba(0,0,0,.4), 0 0 0 0 rgba(242,109,156,0)}
  50%{box-shadow:5px 5px 0 rgba(0,0,0,.4), 0 0 24px 2px rgba(242,109,156,.8)}}
.rec-badge{position:absolute; top:-13px; left:50%; transform:translateX(-50%); white-space:nowrap;
  background:var(--accent); color:#fff; border:2px solid var(--accent-d); border-radius:5px; padding:4px 12px;
  font-family:'NeoDunggeunmo','Pretendard Variable',sans-serif; letter-spacing:0; font-size:.68rem; box-shadow:0 3px 0 var(--accent-d)}
.pb-emo{width:54px; height:54px; margin:4px auto 11px; border-radius:13px; background:#fff; border:2px solid #17171C;
  display:flex; align-items:center; justify-content:center; font-size:28px; box-shadow:2px 2px 0 rgba(0,0,0,.25)}
.pbox.rec .pb-emo{background:var(--accent-soft)}
.pb-name{font-size:1.08rem; font-weight:800; color:var(--ink); margin-bottom:13px}
/* 혼잡도 미터 — 3칸 */
.cong{display:flex; align-items:center; justify-content:center; gap:6px; margin-bottom:7px}
.cong .clab{font-size:.64rem; font-weight:700; color:#A8834A; margin-right:1px}
.cseg{width:15px; height:8px; border-radius:2px; border:1.5px solid rgba(0,0,0,.26); background:#EFE3D0}
.cong b{font-size:.78rem; font-weight:800; margin-left:2px}
.pb-online{font-size:.72rem; color:#8B7A5A; font-weight:600}
/* 왜 추천? — 호버 팝오버 (나에게 맞춘 이유) */
.why{position:absolute; left:50%; bottom:calc(100% + 12px); transform:translateX(-50%) translateY(6px);
  width:min(252px,78vw); background:#17131F; color:#EFE4EC; border:2px solid #0B0912; border-radius:10px;
  padding:12px 14px; text-align:left; opacity:0; visibility:hidden; pointer-events:none; z-index:9;
  box-shadow:0 10px 24px rgba(0,0,0,.45); transition:opacity .16s ease, transform .16s ease}
.pbox:hover .why{opacity:1; visibility:visible; transform:translateX(-50%) translateY(0)}
.why::after{content:""; position:absolute; top:100%; left:50%; transform:translateX(-50%); border:7px solid transparent; border-top-color:#17131F}
.why-h{font-size:.72rem; font-weight:800; color:#FFD9E8; margin-bottom:8px;
  font-family:'NeoDunggeunmo','Pretendard Variable',sans-serif; letter-spacing:0}
.why ul{list-style:none; display:flex; flex-direction:column; gap:5px}
.why li{font-size:.77rem; line-height:1.45; color:#D8CFE8; display:flex; gap:7px}
.why li::before{content:"✦"; color:var(--accent); flex-shrink:0}
.why-match{margin-top:10px; padding-top:9px; border-top:1px dashed rgba(255,255,255,.16); font-size:.74rem; font-weight:800; color:#FFD9E8}

/* pbtn (강의실과 동일 — 청크 버튼) */
.pbtn{display:inline-flex; align-items:center; gap:6px; font-size:.85rem; padding:10px 20px; border-radius:5px;
  background:var(--accent); color:#fff; border:2px solid var(--accent-d); box-shadow:0 4px 0 var(--accent-d); transition:transform .08s, box-shadow .08s}
.pbtn:active{transform:translateY(3px); box-shadow:0 1px 0 var(--accent-d)}
.pbtn.gray{background:#8B95A1; border-color:#6B7684; box-shadow:0 4px 0 #6B7684}
.pbtn.gray:active{box-shadow:0 1px 0 #6B7684}

/* 푸터 */
.foot{position:relative; z-index:1; text-align:center; padding:10px 20px 40px; font-size:.74rem; color:#8478A0}
.foot a{color:#B7AACB; margin:0 6px}

/* 완강 게이트 (강의실 sec-card) */
.gate{position:fixed; inset:0; z-index:80; background:rgba(20,15,28,.72); backdrop-filter:blur(4px); display:none; align-items:center; justify-content:center; padding:24px}
.gate.on{display:flex}
.g-card{background:var(--paper); border:3px solid #17171C; border-radius:8px; box-shadow:8px 8px 0 rgba(0,0,0,.5); padding:30px 30px 26px; text-align:center; width:min(420px,90vw); animation:rise .3s ease}
.g-card .ge{font-size:44px; margin-bottom:10px}
.g-card h2{font-size:1.3rem; font-weight:800; letter-spacing:-0.03em; margin-bottom:8px}
.g-card p{font-size:.85rem; color:#7A7264; line-height:1.65; margin-bottom:20px}
.g-card .btns{display:flex; flex-direction:column; gap:9px}
.g-card .pbtn{justify-content:center; width:100%}
</style>
</head>
<body>
<div class="bg-night"></div>

<div class="hud">
  <span class="pill-stat"><span class="ic">◗</span><span id="shellN">20</span></span>
  <span class="spacer"></span>
  <a class="hud-btn" href="worldmap-prototype.html" title="월드맵">🗺️</a>
  <a class="hud-btn" href="myspace-prototype.html?mode=full" title="마이스페이스">🏠</a>
</div>

<div class="stage">
  <div class="lesson-col">
    <div class="sign">
      <span class="board">⛲ 광장 로비</span>
      <small><b id="uName">김이서</b> 님, 오늘 머물 광장을 골라보세요 — 혼잡도와 나에게 맞는 정도를 보고요</small>
    </div>
    <div class="status">
      <span class="st">커리큘럼 4단계</span>
      <span class="st">관심 기록·전략</span>
      <span class="st">신뢰점수 712</span>
    </div>
    <div class="plaza-grid" id="list"></div>
  </div>
</div>

<div class="foot">
  <a href="worldmap-prototype.html">🗺️ 월드맵</a> ·
  <a href="index.html">프로토타입 목록</a>
</div>

<!-- 완강 게이트 -->
<div class="gate" id="gate">
  <div class="g-card">
    <div class="ge">⛲</div>
    <h2>광장은 완강 후 열려요</h2>
    <p>모든 강의를 100% 완강(산출물 5개)하면 광장 문이 열려요. 지금은 강의부터 마저 들어볼까요?</p>
    <div class="btns">
      <button class="pbtn" onclick="location.href='lecture-prototype.html'">📺 강의 들으러 가기</button>
      <button class="pbtn gray" onclick="document.getElementById('gate').classList.remove('on')">그냥 들어가기</button>
    </div>
  </div>
</div>

<script>
const NAME = localStorage.getItem('trus_name') || '김이서';
document.getElementById('uName').textContent = NAME;
if(localStorage.getItem('trus_lecture_complete') !== '1') document.getElementById('gate').classList.add('on');

const CONG = { easy:{n:1,c:'#4FB65C',label:'여유'}, mid:{n:2,c:'#D99A1C',label:'적당'}, busy:{n:3,c:'#E24B4B',label:'붐빔'} };
const PLAZAS = [
  {id:'growth', emo:'🌱', name:'성장 광장', desc:'다음 3개월 전략을 다듬고, 실행을 서로 일으켜주는 사람들이 모여요.',
    match:92, reasons:['나와 비슷한 고민 12명','같은 커리큘럼 4단계 9명','관심사 겹침 전략·기록'], cong:'mid', online:34, rec:true},
  {id:'record', emo:'📚', name:'기록 광장', desc:'매일의 업무 기록과 회고를 나누며 꾸준함을 지키는 곳이에요.',
    match:84, reasons:['나와 비슷한 고민 7명','같은 커리큘럼 단계 5명','100번 쓰기 함께 14명'], cong:'easy', online:21, rec:false},
  {id:'money', emo:'💰', name:'머니 광장', desc:'숫자언어로 매출·지표를 열어보고 서로 점검해 주는 사람들이에요.',
    match:71, reasons:['나와 비슷한 고민 5명','같은 커리큘럼 단계 3명','지금 활발한 대화'], cong:'busy', online:52, rec:false},
  {id:'dawn', emo:'🌅', name:'새벽 광장', desc:'아침 세팅과 미라클 모닝을 함께하는 이른 시간대의 조용한 광장이에요.',
    match:63, reasons:['아침형 12명','고요한 분위기'], cong:'easy', online:9, rec:false},
  {id:'retro', emo:'🪞', name:'회고 광장', desc:'하루를 돌아보고 서로의 회고에 응원을 남기는 저녁의 광장이에요.',
    match:58, reasons:['저녁 회고 15명','응원 활발'], cong:'mid', online:18, rec:false},
];
function esc(s){return String(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}
document.getElementById('list').innerHTML = PLAZAS.map((p,idx)=>{
  const cg = CONG[p.cong];
  const segs = [1,2,3].map(i=>`<span class="cseg" ${i<=cg.n?`style="background:${cg.c};border-color:${cg.c}"`:''}></span>`).join('');
  const reasons = p.reasons.map(r=>`<li>${esc(r)}</li>`).join('');
  return `<div class="pbox ${p.rec?'rec':''}" style="animation-delay:${idx*60}ms" onclick="location.href='plaza-prototype.html?id=${p.id}'">
    ${p.rec?'<span class="rec-badge">✨ 나에게 추천</span>':''}
    <div class="pb-emo">${p.emo}</div>
    <div class="pb-name">${esc(p.name)}</div>
    <div class="cong"><span class="clab">혼잡도</span>${segs}<b style="color:${cg.c}">${cg.label}</b></div>
    <div class="pb-online">지금 접속 ${p.online}명</div>
    <div class="why">
      <div class="why-h">${p.rec?'✨ 이래서 추천해요':'나와 맞는 이유'}</div>
      <ul>${reasons}</ul>
      <div class="why-match">나와 맞는 정도 ${p.match}%</div>
    </div>
  </div>`;
}).join('');
</script>
</body>
</html>
