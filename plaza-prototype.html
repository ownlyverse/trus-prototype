<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>바운더리 타운 — 광장 (프로토타입)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
@font-face{font-family:'NeoDunggeunmo'; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_two@1.0/NeoDunggeunmo.woff') format('woff'); font-display:swap}
:root{
  --ink:#191F28; --paper:#FFFFFF;
  --sky-a:#F5C98A; --sky-b:#E8A96B; --ground-a:#C9B08E; --ground-b:#B49A78;
  --wood:#8B6844; --wood-d:#6E5236;
  --tide:#3182F6; --tide-soft:#E8F3FF;
  --shell:#F76B1C; --shell-soft:#FFF1E7;
  --amber:#D18E0F;
  --panel-w:410px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"Pretendard Variable",Pretendard,-apple-system,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  color:var(--ink); letter-spacing:-0.01em; overflow:hidden; background:#20242E;
}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
.num{font-variant-numeric:tabular-nums}

/* 픽셀 폰트 — 게임 UI 요소에만 */
.pill-stat, .hud-btn, .obj .tag, .char .nametag, .hint, .panel h3, .pbtn, .pill, .neon-sign, .proto-tag, .gate h2{
  font-family:'NeoDunggeunmo','Pretendard Variable',Pretendard,sans-serif; letter-spacing:0;
}

/* ---------- 게임 HUD ---------- */
.hud{position:fixed; top:0; left:0; right:0; z-index:60; display:flex; align-items:flex-start; gap:8px; padding:12px 14px; pointer-events:none}
.hud>*{pointer-events:auto}
.hud .spacer{flex:1; pointer-events:none}
.pill-stat{display:inline-flex; align-items:center; gap:7px; padding:5px 14px 5px 7px; border-radius:16px; background:#F7E9C4; border:3px solid #17171C; box-shadow:0 3px 0 rgba(0,0,0,.5); font-size:.85rem; color:#4A3A18}
.pill-stat .ic{width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:#F2C14E; border:2px solid #B8860B; font-size:.7rem; color:#7A4E00}
.pill-stat.trust{background:#E7DBF5; color:#4A3572}
.pill-stat.trust .ic{background:#B79BE0; border-color:#7C5BB5}
.pill-stat.live{background:#FFD9E8; color:#8A2D55}
.pill-stat.live .ic{background:#F26D9C; border-color:#B03A66; animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.hud-btn{position:relative; width:42px; height:42px; border-radius:10px; background:#FFF9E9; border:3px solid #17171C; box-shadow:0 3px 0 rgba(0,0,0,.5); font-size:1.1rem; display:flex; align-items:center; justify-content:center}
.hud-btn:active{transform:translateY(2px); box-shadow:0 1px 0 rgba(0,0,0,.5)}
.hud-btn{flex-shrink:0}
.hud-btn .badge-n{position:absolute; top:-7px; right:-7px; background:#F26D9C; color:#fff; border:2px solid #0B0912; border-radius:8px; font-size:.6rem; padding:0 5px; font-weight:700}
.hud-btn[data-panel]{position:relative}

/* ---------- 장면 (해질녘 광장) ---------- */
.scene{position:fixed; inset:0; overflow:hidden; background:#6E4634}
.bg-sky{position:absolute; left:0; right:0; top:0; height:58%; background:url('assets/plaza-bg.png') center bottom/cover; image-rendering:pixelated}
.bg-sky::before{content:none}
.bg-sky::after{content:none}
.neon-sign{position:absolute; left:50%; transform:translateX(-50%); top:10%; z-index:4;
  font-size:clamp(1.1rem, 3vw, 1.6rem); color:#FFD9E8; padding:8px 22px;
  background:#17131F; border:3px solid #F26D9C; border-radius:8px;
  text-shadow:0 0 8px #F26D9C, 0 0 18px #F26D9C; box-shadow:0 0 16px rgba(242,109,156,.5), 0 4px 0 rgba(0,0,0,.5);
}
.bg-floor{position:absolute; left:0; right:0; top:58%; bottom:0;
  background:repeating-conic-gradient(#D9A47C 0% 25%, #E5B58E 0% 50%) 0 0/52px 52px}
.bg-grass{position:absolute; left:0; right:0; bottom:0; height:6%; z-index:2; border-top:4px solid #45703A;
  background:
    radial-gradient(circle 4px at 12% 40%, #F26D8D 98%, transparent),
    radial-gradient(circle 4px at 32% 62%, #F2D24E 98%, transparent),
    radial-gradient(circle 4px at 55% 45%, #C9E9FA 98%, transparent),
    radial-gradient(circle 4px at 76% 58%, #F26D8D 98%, transparent),
    radial-gradient(circle 4px at 92% 42%, #F2D24E 98%, transparent),
    linear-gradient(#6FA34E,#578540);
}

/* ---------- 오브젝트 ---------- */
.obj{position:absolute; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; user-select:none; transform:translate(-50%,0); transition:transform .15s; z-index:5}
.obj:hover{transform:translate(-50%,-4px)}
.obj .art{font-size:52px; line-height:1; filter:drop-shadow(4px 5px 0 rgba(0,0,0,.35))}
.obj .art.big{font-size:68px}
.obj .art.small{font-size:44px}
.obj .tag{font-size:.72rem; font-weight:400; background:#17131F; color:#FFFFFF; padding:3px 9px; border-radius:2px; border:2px solid #0B0912; white-space:nowrap; box-shadow:2px 2px 0 rgba(0,0,0,.4)}
.obj .tag small{font-weight:400; opacity:.75}
.obj.near .tag{background:var(--tide)}
.obj.center .tag{background:var(--shell)}

/* ---------- 캐릭터 공통 ---------- */
.char{position:absolute; width:56px; transform:translate(-50%,0); z-index:10; transition:left 1.1s ease, bottom 1.1s ease; display:flex; flex-direction:column; align-items:center; pointer-events:none}
.char .nametag{font-size:.66rem; background:#17131F; color:#fff; padding:2px 8px; border-radius:2px; border:2px solid #0B0912; margin-bottom:4px}
.char .body{position:relative; width:36px; height:48px}
.char .spr{position:absolute; top:0; left:0; width:3px; height:3px; background:transparent; image-rendering:pixelated}
.char .shadow{width:34px; height:8px; border-radius:2px; background:rgba(0,0,0,.35); margin-top:2px}
.char .bubble{
  position:absolute; bottom:calc(100% + 8px); left:50%; transform:translateX(-50%);
  background:#fff; border:2px solid #17131F; border-radius:3px; padding:6px 10px; font-size:.74rem; font-weight:600;
  white-space:nowrap; box-shadow:3px 3px 0 rgba(0,0,0,.35); opacity:0; transition:opacity .25s; z-index:20;
}
.char .bubble.show{opacity:1}
.char .bubble::after{content:""; position:absolute; top:100%; left:50%; transform:translateX(-50%); border:6px solid transparent; border-top-color:#fff}
.char.me{z-index:12}
.char.me .nametag{background:var(--tide); border-color:#1B4FA0}

/* ---------- 패널 ---------- */
.panel{
  position:fixed; top:64px; right:14px; width:var(--panel-w); max-width:calc(100vw - 28px);
  max-height:calc(100vh - 84px); overflow-y:auto; z-index:70;
  background:var(--paper); border-radius:6px; border:3px solid #2B2B33; box-shadow:8px 8px 0 rgba(43,43,51,.25);
  padding:20px 22px; display:none;
}
.panel.open{display:block}
.panel .p-close{position:absolute; top:14px; right:14px; font-size:1rem; color:#8B95A1}
.panel h3{font-size:1.05rem; font-weight:800; margin-bottom:2px; padding-right:24px}
.panel .p-sub{font-size:.74rem; color:#8B95A1; margin-bottom:14px; line-height:1.5}
.panel h4{font-size:.78rem; font-weight:700; color:#8B95A1; margin:16px 0 8px}
.row{display:flex; justify-content:space-between; align-items:center; font-size:.85rem; padding:6px 0; border-bottom:1px dashed #E5E8EB}
.row:last-child{border-bottom:none}
.pill{display:inline-flex; align-items:center; gap:4px; font-size:.68rem; font-weight:400; padding:2px 8px; border-radius:3px}
.pill.ok{background:var(--tide-soft); color:var(--tide)}
.pill.sh{background:var(--shell-soft); color:var(--shell)}
.pill.mut{background:#F2F4F6; color:#8B95A1}
.pill.tbd{background:#FFF3D6; color:var(--amber)}
.shellv{color:var(--shell); font-weight:700}
.shellv::before{content:"◗ "; font-size:.8em}
.pbtn{display:inline-flex; align-items:center; gap:6px; font-size:.82rem; font-weight:400; padding:8px 16px; border-radius:4px; background:var(--tide); color:#fff; border:2px solid #1B64DA; box-shadow:0 4px 0 #1B64DA; transition:transform .08s, box-shadow .08s}
.pbtn:hover{background:#4A93F8}
.pbtn:active{transform:translateY(3px); box-shadow:0 1px 0 #1B64DA}
.pbtn.ghost{background:#fff; color:var(--ink); border:2px solid #C6CDD5; box-shadow:0 4px 0 #C6CDD5}
.pbtn.ghost:active{box-shadow:0 1px 0 #C6CDD5}
.pbtn.done{background:#F2F4F6; color:#8B95A1; cursor:default}
.pnote{font-size:.72rem; color:#8B95A1; background:#F2F4F6; border-radius:8px; padding:9px 11px; line-height:1.6; margin-top:12px}
.pnote b{color:var(--ink)}
.ptabs{display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap}
.ptabs button{font-size:.76rem; font-weight:700; padding:5px 12px; border-radius:16px; background:#F2F4F6; color:#8B95A1}
.ptabs button.active{background:var(--ink); color:#fff}
.helpcard{background:#fff; border:1px solid #E5E8EB; border-radius:10px; padding:11px 13px; margin-bottom:8px}
.helpcard .h-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:4px}
.helpcard .h-top b{font-size:.86rem}
.helpcard p{font-size:.76rem; color:#8B95A1; line-height:1.5}
.helpcard .h-foot{display:flex; align-items:center; gap:8px; margin-top:8px}
.postcard{background:#fff; border:1px solid #E5E8EB; border-radius:10px; padding:11px 13px; margin-bottom:8px}
.postcard .n-top{display:flex; justify-content:space-between; font-size:.72rem; color:#8B95A1; margin-bottom:3px}
.postcard .n-top b{color:var(--ink)}
.postcard p{font-size:.83rem; line-height:1.55}
.membercard{background:#fff; border:1px solid #E5E8EB; border-radius:10px; padding:12px 14px; margin-bottom:8px}
.membercard .m-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:5px}
.membercard .m-top b{font-size:.88rem}
.membercard p{font-size:.78rem; color:#4E5968; line-height:1.6}
.steps5{display:flex; gap:4px; margin:10px 0}
.steps5 span{flex:1; text-align:center; font-size:.62rem; font-weight:700; padding:5px 2px; background:#F2F4F6; color:#8B95A1; border-radius:5px}
.steps5 span.on{background:var(--tide); color:#fff}

/* 개장 전 게이트 */
.gate{position:fixed; inset:0; z-index:65; background:rgba(32,38,50,.78); backdrop-filter:blur(4px);
  display:none; align-items:center; justify-content:center; text-align:center; color:#FFFFFF}
.gate.show{display:flex}
.gate .g-box{max-width:420px; padding:30px}
.gate h2{font-size:1.5rem; font-weight:800; margin-bottom:10px}
.gate p{font-size:.9rem; line-height:1.7; color:#C6CFD8; margin-bottom:18px}

.hint{position:fixed; bottom:14px; left:50%; transform:translateX(-50%); z-index:55; font-size:.76rem; color:#FFFFFF; background:#17131F; border:2px solid #0B0912; border-radius:3px; padding:6px 16px; box-shadow:3px 3px 0 rgba(0,0,0,.4)}
.proto-tag{position:fixed; bottom:14px; right:14px; font-size:.66rem; color:#B0B8C1; z-index:55}
@media(prefers-reduced-motion:reduce){.char{transition:none}}
</style>
</head>
<body>

<!-- ============ 게임 HUD ============ -->
<header class="hud">
  <span class="pill-stat"><span class="ic">◗</span><b class="num">96</b></span>
  <span class="pill-stat trust"><span class="ic">★</span><b class="num">84</b></span>
  <span class="pill-stat live"><span class="ic">📡</span>20시 라이브</span>
  <span class="spacer"></span>
  <button class="hud-btn" data-panel="stage" title="무대 — 오늘 20시 라이브">🎤</button>
  <button class="hud-btn" data-panel="table" title="약속 테이블">⛱️<span class="badge-n">1</span></button>
  <button class="hud-btn" data-panel="schedule" title="일정 안내판">🕰️</button>
  <button class="hud-btn" id="chipBack" title="마이스페이스로">🏠</button>
</header>

<!-- ============ 장면 ============ -->
<div class="scene" id="scene">
  <div class="bg-sky"></div>

    <div class="bg-floor"></div>
  <div class="bg-grass"></div>
  <div class="neon-sign">⛲ 타운 — 광장 · 접속 41명</div>

  <!-- 오브젝트 6종 · 도움 게시판이 중심 구조물 -->
  <div class="obj center" data-obj="help"     style="left:50%; top:56%"><div class="art big">🪧</div><div class="tag">도움 게시판 <small>새 글 9</small></div></div>
  <div class="obj" data-obj="members"  style="left:22%; top:60%"><div class="art">🪪</div><div class="tag">멤버 소개 보드 <small>AI 생성</small></div></div>
  <div class="obj" data-obj="board"    style="left:10%; top:74%"><div class="art">📋</div><div class="tag">게시판 <small>공지·자랑·같이 놀래요</small></div></div>

  <!-- 걸어다니는 사람들 (공개 말풍선) -->
  <div class="char" id="npc-junho"  style="left:38%; bottom:30%" data-spr="junho"><div class="bubble"></div><div class="nametag">박준호</div><div class="body"><div class="spr"></div></div><div class="shadow"></div></div>
  <div class="char" id="npc-dain"   style="left:60%; bottom:22%" data-spr="dain"><div class="bubble"></div><div class="nametag">정다인</div><div class="body"><div class="spr"></div></div><div class="shadow"></div></div>
  <div class="char" id="npc-yeonwoo" style="left:70%; bottom:34%" data-spr="yeonwoo"><div class="bubble"></div><div class="nametag">최연우</div><div class="body"><div class="spr"></div></div><div class="shadow"></div></div>
  <div class="char" id="npc-bora"   style="left:26%; bottom:14%" data-spr="bora"><div class="bubble"></div><div class="nametag">황보라</div><div class="body"><div class="spr"></div></div><div class="shadow"></div></div>

  <!-- 나 -->
  <div class="char me" id="me" style="left:48%; bottom:10%" data-spr="me">
    <div class="bubble" id="meBubble"></div>
    <div class="nametag">김이서</div>
    <div class="body"><div class="spr"></div></div>
    <div class="shadow"></div>
  </div>
</div>

<!-- 완강 게이트 -->
<div class="gate" id="gate">
  <div class="g-box">
    <h2>광장은 완강한 사람들의 공간이에요</h2>
    <p>강의의 모든 에피소드를 100% 마치면 문이 열려요.<br>여기 있는 사람들은 전부 그 여정을 끝낸 사람들이에요.</p>
    <div style="display:flex; gap:8px; justify-content:center; flex-wrap:wrap">
      <button class="pbtn" onclick="location.href='lecture-prototype.html'">📺 강의 들으러 가기</button>
      <button class="pbtn" id="gateEnter" style="background:#8B95A1; border-color:#6B7684; box-shadow:0 4px 0 #6B7684">프로토타입이니 그냥 들어가기</button>
    </div>
  </div>
</div>

<div class="hint">대화는 모두 공개 — 머리 위 말풍선 · 귓속말 없음 · 오브젝트를 클릭하면 다가가서 엽니다</div>
<div class="proto-tag">광장 프로토타입 · 목데이터</div>

<!-- ============ 패널 ============ -->
<div class="panel" id="panel">
  <button class="p-close" id="panelClose">✕</button>
  <div id="panelBody"></div>
</div>

<script>
/* ================= 픽셀 스프라이트 ================= */
const SPRITE_MAP = [
  '..HHHHHHHH..','.HHHHHHHHHH.','.HHHHHHHHHH.','.HHSSSSSSHH.','..SESSSSES..','..SSSSSSSS..',
  '...SSSSSS...','..TTTTTTTT..','.TTTTTTTTTT.','.TSTTTTTTST.','..TTTTTTTT..','..PPPPPPPP..',
  '..PPP..PPP..','..PPP..PPP..','..DDD..DDD..',
];
const PALETTES = {
  me:      {H:'#4A3628', S:'#F2C9A8', E:'#222831', T:'#3182F6', P:'#2B3442', D:'#6E5236'},
  junho:   {H:'#3E9E58', S:'#F2C9A8', E:'#222831', T:'#5B6ABF', P:'#2B3442', D:'#333A46'},
  dain:    {H:'#E86CA8', S:'#F6D2AE', E:'#222831', T:'#46D5B2', P:'#3A2E52', D:'#5A4630'},
  yeonwoo: {H:'#5B8FD9', S:'#EFC49E', E:'#222831', T:'#8B6844', P:'#2B3442', D:'#333A46'},
  bora:    {H:'#8A5BC4', S:'#F6D2AE', E:'#222831', T:'#F2C14E', P:'#4A2E3E', D:'#5A4630'},
};
document.querySelectorAll('[data-spr]').forEach(el=>{
  const colors = PALETTES[el.dataset.spr] || PALETTES.me;
  const px = 3, shadows = [];
  SPRITE_MAP.forEach((row, y)=>[...row].forEach((ch, x)=>{
    const c = colors[ch];
    if(c) shadows.push(`${x*px}px ${y*px}px 0 0 ${c}`);
  }));
  el.querySelector('.spr').style.boxShadow = shadows.join(',');
});

/* ================= 완강 게이트 — 100% 완강한 사람만 ================= */
(function(){
  if(localStorage.getItem('trus_lecture_complete') !== '1'){
    document.getElementById('gate').classList.add('show');
  }
})();
document.getElementById('gateEnter').addEventListener('click', ()=>document.getElementById('gate').classList.remove('show'));

/* ================= 내 캐릭터 이동 ================= */
const me = document.getElementById('me');
const scene = document.getElementById('scene');
const meBubble = document.getElementById('meBubble');
let walkTimer = null;
function walkTo(l, b, cb){
  me.style.left = l+'%'; me.style.bottom = b+'%';
  clearTimeout(walkTimer); walkTimer = setTimeout(()=>cb&&cb(), 1120);
}
function say(el, text, dur=2600){
  const bb = el.querySelector('.bubble');
  bb.textContent = text; bb.classList.add('show');
  setTimeout(()=>bb.classList.remove('show'), dur);
}
scene.addEventListener('click', e=>{
  if(e.target !== scene && !e.target.classList.contains('bg-floor') && !e.target.classList.contains('bg-grass')) return;
  const r = scene.getBoundingClientRect();
  const x = (e.clientX - r.left)/r.width*100;
  const yTop = (e.clientY - r.top)/r.height*100;
  if(yTop < 56) return;
  walkTo(x, Math.max(3, Math.min(38, 100 - yTop - 8)));
});

/* ================= NPC 배회 + 공개 대화 ================= */
const npcs = [
  {el:document.getElementById('npc-junho'),  lines:['랜딩 카피 피드백 정리해서 올렸어요','오늘 20시 라이브에서 화면 공유해요']},
  {el:document.getElementById('npc-dain'),   lines:['오늘 3개 다 했어요!','이번 주 끝점 다시 잡는 중']},
  {el:document.getElementById('npc-yeonwoo'),lines:['숫자언어 지표 이거 맞나…','도움 글 하나 잡아야지']},
  {el:document.getElementById('npc-bora'),   lines:['100번 쓰기 18일째!','같이 놀래요 글 올렸어요, 목요일 번개 🍜']},
];
setInterval(()=>{
  const n = npcs[Math.floor(Math.random()*npcs.length)];
  const l = 10 + Math.random()*80, b = 4 + Math.random()*30;
  n.el.style.left = l+'%'; n.el.style.bottom = b+'%';
}, 3400);
setInterval(()=>{
  const n = npcs[Math.floor(Math.random()*npcs.length)];
  say(n.el, n.lines[Math.floor(Math.random()*n.lines.length)]);
}, 4200);

/* ================= 오브젝트 → 패널 ================= */
const targets = {help:[50,34], members:[24,30], board:[12,19]};
document.querySelectorAll('[data-obj]').forEach(el=>{
  el.addEventListener('click', e=>{
    e.stopPropagation();
    const id = el.dataset.obj;
    document.querySelectorAll('.obj').forEach(o=>o.classList.remove('near'));
    el.classList.add('near');
    walkTo(targets[id][0], targets[id][1], ()=>openPanel(id));
  });
});

const panel = document.getElementById('panel');
const panelBody = document.getElementById('panelBody');
document.getElementById('panelClose').addEventListener('click', ()=>{
  panel.classList.remove('open');
  document.querySelectorAll('.obj').forEach(o=>o.classList.remove('near'));
});
document.addEventListener('keydown', e=>{ if(e.key==='Escape') panel.classList.remove('open'); });

const P = {};

P.help = `

function openPanel(id){
  panelBody.innerHTML = P[id];
  panel.classList.add('open');
  bindPanel();
  const says = {help:'좋은 요청 먼저 잡아야지', table:'21시 반 약속!', stage:'오늘 라이브 기대되네'};
  if(says[id]) say(me, says[id]);
}
function bindPanel(){
  panelBody.querySelectorAll('[data-hf]').forEach(b=>b.addEventListener('click', ()=>{
    panelBody.querySelectorAll('[data-hf]').forEach(x=>x.classList.remove('active')); b.classList.add('active');
    panelBody.querySelectorAll('[data-hlist]').forEach(l=>l.style.display = l.dataset.hlist===b.dataset.hf ? '' : 'none');
  }));
  panelBody.querySelectorAll('[data-bf]').forEach(b=>b.addEventListener('click', ()=>{
    panelBody.querySelectorAll('[data-bf]').forEach(x=>x.classList.remove('active')); b.classList.add('active');
    panelBody.querySelectorAll('[data-blist]').forEach(l=>l.style.display = l.dataset.blist===b.dataset.bf ? '' : 'none');
  }));
}

document.getElementById('chipBack').addEventListener('click', ()=>{ location.href = 'myspace-prototype.html'; });
document.querySelectorAll('.hud-btn[data-panel]').forEach(b=>b.addEventListener('click', ()=>openPanel(b.dataset.panel)));
