<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>바운더리 타운 — 마이스페이스 (프로토타입)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
@font-face{font-family:'NeoDunggeunmo'; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_two@1.0/NeoDunggeunmo.woff') format('woff'); font-display:swap}
:root{
  --ink:#191F28; --paper:#FFFFFF;
  --wall-a:#F2E3C8; --wall-b:#E8D3AE; --floor-a:#C9A06C; --floor-b:#B4885A;
  --wood:#8B6844; --wood-d:#6E5236;
  --tide:#3182F6; --tide-soft:#E8F3FF;
  --shell:#F76B1C; --shell-soft:#FFF1E7;
  --amber:#D18E0F;
  --panel-w:400px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"Pretendard Variable",Pretendard,-apple-system,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  color:var(--ink); letter-spacing:-0.01em; overflow:hidden; background:#20242E;
}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
.num{font-variant-numeric:tabular-nums}

/* 픽셀 폰트 — 게임 UI 요소에만 */
.pill-stat, .hud-btn, .obj .tag, .me .nametag, .hint, .panel h3, .pbtn, .pill, .mode-banner, .proto-tag, .stat-box b{
  font-family:'NeoDunggeunmo','Pretendard Variable',Pretendard,sans-serif; letter-spacing:0;
}

/* ---------- 게임 HUD (고정 UI는 이것과 패널뿐) ---------- */
.hud{position:fixed; top:0; left:0; right:0; z-index:60; display:flex; align-items:flex-start; gap:8px; padding:12px 14px; pointer-events:none}
.hud>*{pointer-events:auto}
.hud .spacer{flex:1; pointer-events:none}
.pill-stat{display:inline-flex; align-items:center; gap:7px; padding:5px 14px 5px 7px; border-radius:16px; background:#F7E9C4; border:3px solid #2B2B33; box-shadow:0 3px 0 rgba(23,23,28,.35); font-size:.85rem; color:#4A3A18}
.pill-stat .ic{width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:#F2C14E; border:2px solid #B8860B; font-size:.7rem; color:#7A4E00}
.pill-stat.lv{background:#D9EAD3; color:#2F5D22}
.pill-stat.lv .ic{background:#8FC862; border-color:#4E8A38}
.pill-stat.trust{background:#E7DBF5; color:#4A3572}
.pill-stat.trust .ic{background:#B79BE0; border-color:#7C5BB5}
.hud-btn{position:relative; width:42px; height:42px; border-radius:10px; background:#FFF9E9; border:3px solid #2B2B33; box-shadow:0 3px 0 rgba(23,23,28,.35); font-size:1.1rem; display:flex; align-items:center; justify-content:center}
.hud-btn:active{transform:translateY(2px); box-shadow:0 1px 0 rgba(23,23,28,.35)}
.hud-btn .badge-n{position:absolute; top:-7px; right:-7px; background:var(--shell); color:#fff; border:2px solid #17171C; border-radius:8px; font-size:.6rem; padding:0 5px; font-weight:700}

/* ---------- 장면 — 파스텔 픽셀 타운 ---------- */
.scene{position:fixed; inset:0; overflow:hidden; background:#F6D9E2}
.bg-sky{position:absolute; left:0; right:0; top:0; height:30%;
  background:linear-gradient(#A8C8EE 0%, #E8C4DD 48%, #F7CFC4 78%, #FBE3C9 100%)}
.bg-sky::before{ /* 픽셀 구름 */
  content:""; position:absolute; left:8%; top:22%; width:14px; height:14px; background:#fff;
  box-shadow:14px 0 #fff, 28px 0 #fff, 42px 0 #fff, 14px -14px #fff, 28px -14px #fff,
    52vw 10px #FFF3EC, calc(52vw + 14px) 10px #FFF3EC, calc(52vw + 28px) 10px #FFF3EC, calc(52vw + 14px) -4px #FFF3EC,
    26vw 44px #FFFBF6, calc(26vw + 14px) 44px #FFFBF6, calc(26vw + 28px) 44px #FFFBF6,
    78vw 30px #FFF3EC, calc(78vw + 14px) 30px #FFF3EC;
}
.bg-sky::after{ /* 도시 실루엣 */
  content:""; position:absolute; left:0; right:0; bottom:0; height:36%; opacity:.6;
  background:
    linear-gradient(#8FA0C4,#8FA0C4) 2% 100%/7% 58% no-repeat,
    linear-gradient(#9AAACB,#9AAACB) 11% 100%/5% 88% no-repeat,
    linear-gradient(#8FA0C4,#8FA0C4) 19% 100%/9% 48% no-repeat,
    linear-gradient(#A3B1D1,#A3B1D1) 31% 100%/6% 72% no-repeat,
    linear-gradient(#8FA0C4,#8FA0C4) 43% 100%/7% 60% no-repeat,
    linear-gradient(#9AAACB,#9AAACB) 56% 100%/5% 84% no-repeat,
    linear-gradient(#8FA0C4,#8FA0C4) 67% 100%/9% 52% no-repeat,
    linear-gradient(#A3B1D1,#A3B1D1) 81% 100%/6% 74% no-repeat,
    linear-gradient(#8FA0C4,#8FA0C4) 93% 100%/6% 62% no-repeat;
}
.bg-shop{position:absolute; left:0; right:0; top:30%; height:28%;
  background:
    repeating-linear-gradient(90deg, rgba(0,0,0,.10) 0 4px, transparent 4px 96px),
    linear-gradient(#7A5A3C, #684C31)}
.bg-shop::before{ /* 안쪽 선반 */
  content:""; position:absolute; inset:16% 3% 12%;
  background:
    repeating-linear-gradient(180deg, transparent 0 24%, rgba(255,220,160,.15) 24% 28%, transparent 28% 33%),
    repeating-linear-gradient(90deg, transparent 0 68px, rgba(0,0,0,.20) 68px 72px);
}
.awning{position:absolute; left:5%; right:5%; top:28.4%; height:4.6%; z-index:3;
  background:repeating-linear-gradient(90deg, #7C8BE0 0 46px, #95A4F1 46px 92px);
  border:3px solid #2B2B33; border-radius:8px 8px 0 0;
}
.awning::after{content:""; position:absolute; left:-3px; right:-3px; top:100%; height:12px;
  background:radial-gradient(circle at 23px 0, #7C8BE0 0 20px, transparent 21px) 0 0/46px 12px;
}
.bg-floor{position:absolute; left:0; right:0; top:58%; bottom:0;
  background:repeating-conic-gradient(#F0B8C8 0% 25%, #F6CBD7 0% 50%) 0 0/52px 52px}
.bg-grass{position:absolute; left:0; right:0; bottom:0; height:6%; z-index:2; border-top:4px solid #4E8A38;
  background:
    radial-gradient(circle 4px at 12% 40%, #F26D8D 98%, transparent),
    radial-gradient(circle 4px at 32% 62%, #F2D24E 98%, transparent),
    radial-gradient(circle 4px at 55% 45%, #fff 98%, transparent),
    radial-gradient(circle 4px at 76% 58%, #F26D8D 98%, transparent),
    radial-gradient(circle 4px at 92% 42%, #F2D24E 98%, transparent),
    linear-gradient(#7CBF5B,#63A748);
}

/* ---------- 오브젝트 ---------- */
.obj{
  position:absolute; display:flex; flex-direction:column; align-items:center; gap:4px;
  cursor:pointer; user-select:none; transform:translate(-50%,0); transition:transform .15s;
}
.obj:hover{transform:translate(-50%,-4px)}
.obj::before{content:""; position:absolute; left:50%; bottom:22px; transform:translateX(-50%); width:52px; height:9px; border-radius:2px; background:rgba(60,40,10,.18)}
.obj .art{
  position:relative; font-size:52px; line-height:1;
  filter:drop-shadow(4px 5px 0 rgba(60,40,10,.22));
}
.obj .art.small{font-size:42px}
.obj .tag{
  font-size:.72rem; font-weight:400; background:#2B2B33; color:#FFFFFF;
  padding:3px 9px; border-radius:2px; border:2px solid #17171C; white-space:nowrap;
  box-shadow:2px 2px 0 rgba(23,23,28,.35);
}
.obj .tag small{font-weight:400; opacity:.75}
.obj.near .tag{background:var(--tide)}
.obj.near .tag::after{content:" · Space"; opacity:.8; font-weight:400}
.presence.near{outline:3px solid var(--tide)}
.me.flip .body{--fx:-1; transform:scaleX(-1)}

/* 모드 배너 (demo / trial) */
.mode-banner{position:fixed; top:64px; left:0; right:0; z-index:58; display:none; align-items:center; gap:10px; padding:8px 14px; font-size:.78rem; font-weight:600; color:#fff; flex-wrap:wrap}
.mode-banner.show{display:flex}
.mode-banner.demo{background:rgba(49,130,246,.96)}
.mode-banner.trial{background:rgba(247,107,28,.96)}
.mode-banner .mb-btn{font-size:.76rem; font-weight:400; background:#fff; color:var(--ink); border-radius:3px; padding:4px 12px; box-shadow:0 3px 0 rgba(23,23,28,.25)}
.mode-banner .spacer{flex:1}
.obj.locked .art{filter:grayscale(.95) opacity(.55)}
.obj.locked .tag{background:rgba(32,38,50,.55)}
.obj.locked .tag::before{content:"🔒 "}
.presence.locked{filter:grayscale(.9) opacity(.65)}

/* 프레즌스 전광판 — 건물 위 간판 (항상 보임) */
.presence{
  position:absolute; left:50%; transform:translateX(-50%); top:17.5%; width:min(420px,52%); z-index:4;
  background:#23283A; border:4px solid #2B2B33; border-radius:6px;
  padding:9px 12px; color:#E8E4DA; cursor:pointer;
  box-shadow:0 5px 0 rgba(23,23,28,.4);
}
.presence:hover{outline:3px solid var(--tide)}
.presence .p-head{display:flex; justify-content:space-between; font-size:.68rem; color:#9AA3B0; margin-bottom:6px}
.presence .p-head b{color:#BFE3DB}
.presence .p-item{font-size:.76rem; line-height:1.5; padding:4px 0; border-top:1px dashed rgba(255,255,255,.12)}
.presence .p-item:first-of-type{border-top:none}
.presence .p-item .who{font-weight:700; color:#F0D9A8}

/* ---------- 캐릭터 ---------- */
.me{
  position:absolute; width:56px; transform:translate(-50%,0); z-index:10;
  transition:left .7s ease, bottom .7s ease; pointer-events:none;
  display:flex; flex-direction:column; align-items:center;
}
.me .nametag{font-size:.68rem; background:#2B2B33; color:#fff; padding:2px 8px; border-radius:2px; border:2px solid #17171C; margin-bottom:4px}
.me .body{position:relative; width:36px; height:48px}
.me .sprite{position:absolute; top:0; left:0; width:3px; height:3px; background:transparent; image-rendering:pixelated}
.me .shadow{width:34px; height:8px; border-radius:2px; background:rgba(60,40,10,.22); margin-top:2px}
.me.walking .body{animation:bob .35s infinite alternate}
@keyframes bob{from{transform:scaleX(var(--fx,1)) translateY(0)}to{transform:scaleX(var(--fx,1)) translateY(-3px)}}
.me .bubble{
  position:absolute; bottom:calc(100% + 8px); left:50%; transform:translateX(-50%);
  background:#fff; border:2px solid #2B2B33; border-radius:3px; padding:6px 10px; font-size:.74rem; font-weight:600;
  white-space:nowrap; box-shadow:0 4px 12px rgba(0,0,0,.15); opacity:0; transition:opacity .2s;
}
.me .bubble.show{opacity:1}
.me .bubble::after{content:""; position:absolute; top:100%; left:50%; transform:translateX(-50%); border:6px solid transparent; border-top-color:#fff}

/* ---------- 상호작용 패널 ---------- */
.panel{
  position:fixed; top:64px; right:14px; width:var(--panel-w); max-width:calc(100vw - 28px);
  max-height:calc(100vh - 84px); overflow-y:auto; z-index:70;
  background:var(--paper); border-radius:6px; border:3px solid #2B2B33;
  box-shadow:8px 8px 0 rgba(43,43,51,.25);
  padding:20px 22px; display:none;
}
.panel.open{display:block}
.panel .p-close{position:absolute; top:14px; right:14px; font-size:1rem; color:#8B95A1}
.panel h3{font-size:1.05rem; font-weight:800; margin-bottom:2px; padding-right:24px}
.panel .p-sub{font-size:.74rem; color:#8B95A1; margin-bottom:14px; line-height:1.5}
.panel h4{font-size:.78rem; font-weight:700; color:#8B95A1; margin:16px 0 8px}
.panel .row{display:flex; justify-content:space-between; align-items:center; font-size:.85rem; padding:6px 0; border-bottom:1px dashed #E5E8EB}
.panel .row:last-child{border-bottom:none}
.panel .row b{font-weight:700}
.pill{display:inline-flex; align-items:center; gap:4px; font-size:.68rem; font-weight:400; padding:2px 8px; border-radius:3px}
.pill.ok{background:var(--tide-soft); color:var(--tide)}
.pill.sh{background:var(--shell-soft); color:var(--shell)}
.pill.mut{background:#F2F4F6; color:#8B95A1}
.pill.tbd{background:#FFF3D6; color:var(--amber)}
.shellv{color:var(--shell); font-weight:700}
.shellv::before{content:"◗ "; font-size:.8em}
.pbtn{display:inline-flex; align-items:center; gap:6px; font-size:.82rem; font-weight:400; padding:8px 16px; border-radius:4px; background:var(--tide); color:#fff; border:2px solid #1B64DA; box-shadow:0 4px 0 #1B64DA; transition:transform .08s, box-shadow .08s}
.pbtn:hover{background:#4A93F8}
.pbtn:active{transform:translateY(3px); box-shadow:0 1px 0 #1B64DA}
.pbtn.ghost{background:#fff; color:var(--ink); border:2px solid #C6CDD5; box-shadow:0 4px 0 #C6CDD5}
.pbtn.ghost:active{box-shadow:0 1px 0 #C6CDD5}

/* 픽셀 위젯 — 스탯 박스 · 진행바 */
.stat-duo{display:flex; gap:10px; margin:12px 0}
.stat-box{flex:1; border:3px solid #2B2B33; border-radius:6px; padding:10px 12px; background:#fff; box-shadow:4px 4px 0 rgba(43,43,51,.12)}
.stat-box>span{font-size:.68rem; color:#8B95A1; font-weight:700; display:block; margin-bottom:3px}
.stat-box b{font-size:1.3rem; line-height:1.2}
.stat-box b small{font-size:.72rem; color:#B0B8C1}
.p-mini{font-size:.68rem; color:#8B95A1; margin-top:6px; line-height:1.4}
.pxbar{height:16px; border:2px solid #2B2B33; border-radius:3px; background:#fff; padding:2px; margin-top:7px}
.pxbar i{display:block; height:100%; background:repeating-linear-gradient(90deg,#3182F6 0 8px,#6FA6F8 8px 16px); border-radius:1px; min-width:4px}
.pxbar.orange i{background:repeating-linear-gradient(90deg,#F76B1C 0 8px,#FB9B60 8px 16px)}
.pbtn.done{background:#F2F4F6; color:#8B95A1; cursor:default}
.pnote{font-size:.74rem; color:#8B95A1; background:#F2F4F6; border-radius:4px; padding:9px 11px; line-height:1.6; margin-top:12px}
.pnote b{color:var(--ink)}
.ta{width:100%; font:inherit; font-size:.84rem; border:2px solid #D8DEE6; border-radius:4px; padding:9px 11px; background:#fff; min-height:80px; resize:vertical; margin-bottom:8px}
.check-item{display:flex; align-items:center; gap:9px; padding:8px 10px; border:1px solid #E5E8EB; border-radius:9px; margin-bottom:7px; font-size:.85rem; background:#fff}
.check-item input{width:16px;height:16px;accent-color:var(--tide)}
.check-item.done span{text-decoration:line-through; color:#8B95A1}
.funnel4{display:flex; flex-direction:column; gap:4px; margin-top:6px}
.funnel4 .f{font-size:.76rem; padding:6px 10px; border-radius:7px; background:#fff; border:1px solid #E5E8EB}
.funnel4 .f b{color:var(--tide)}
.axis{margin-bottom:8px}
.axis .a-label{display:flex; justify-content:space-between; font-size:.74rem; margin-bottom:3px}
.axis .a-track{height:8px; border-radius:4px; background:#F2F4F6}
.axis .a-fill{height:100%; border-radius:4px; background:var(--tide)}
.cal{display:grid; grid-template-columns:repeat(7,1fr); gap:3px; margin-top:6px}
.cal i{aspect-ratio:1; border-radius:4px; background:#F2F4F6; font-style:normal}
.cal i.y{background:var(--tide)}
.cal i.h{background:#8FBFFB}
.chat{display:flex; flex-direction:column; gap:8px; margin-top:8px}
.chat .msg{max-width:88%; font-size:.82rem; line-height:1.55; padding:8px 12px; border-radius:12px}
.chat .npc{background:#fff; border:1px solid #E5E8EB; align-self:flex-start; border-bottom-left-radius:4px}
.chat .user{background:var(--tide); color:#fff; align-self:flex-end; border-bottom-right-radius:4px}
.newscard{background:#fff; border:1px solid #E5E8EB; border-radius:10px; padding:10px 12px; margin-bottom:8px}
.newscard .n-top{display:flex; justify-content:space-between; font-size:.72rem; color:#8B95A1; margin-bottom:3px}
.newscard .n-top b{color:var(--ink)}
.newscard p{font-size:.83rem; line-height:1.5}
.newscard .cheer{margin-top:7px; font-size:.74rem; font-weight:700; color:var(--shell); background:var(--shell-soft); border-radius:16px; padding:4px 11px}
.newscard .cheer.sent{color:#8B95A1; background:#F2F4F6; cursor:default}
.ptabs{display:flex; gap:6px; margin-bottom:10px}
.ptabs button{font-size:.76rem; font-weight:700; padding:5px 12px; border-radius:16px; background:#F2F4F6; color:#8B95A1}
.ptabs button.active{background:var(--ink); color:#fff}


.hint{
  position:fixed; bottom:14px; left:50%; transform:translateX(-50%); z-index:55;
  font-size:.76rem; color:#FFFFFF; background:#2B2B33; border:2px solid #17171C; border-radius:3px; padding:6px 16px; box-shadow:3px 3px 0 rgba(23,23,28,.3);
}
.proto-tag{position:fixed; bottom:14px; right:14px; font-size:.66rem; color:#B0B8C1; z-index:55}
@media(prefers-reduced-motion:reduce){.me{transition:none}.me.walking .body{animation:none}}
</style>
</head>
<body>

<!-- ============ 게임 HUD ============ -->
<header class="hud">
  <span class="pill-stat lv"><span class="ic">🌳</span>Lv.3</span>
  <span class="pill-stat"><span class="ic">◗</span><b class="num">96</b></span>
  <span class="pill-stat trust"><span class="ic">★</span><b class="num">84</b></span>
  <span class="spacer"></span>
  <button class="hud-btn" id="chipMap" title="월드맵">🗺️</button>
  <button class="hud-btn" id="chipNoti" title="알림">🔔<span class="badge-n">2</span></button>
  <button class="hud-btn" id="chipRank" title="랭킹">🏆</button>
</header>

<div class="mode-banner" id="modeBanner"></div>

<!-- ============ 장면 ============ -->
<div class="scene" id="scene">
  <div class="bg-sky"></div>
  <div class="bg-shop"></div>
  <div class="awning"></div>
  <div class="bg-floor"></div>
  <div class="bg-grass"></div>

  <!-- 프레즌스 전광판 — 건물 간판 (항상 보임) -->
  <div class="presence" data-obj="presence" title="프레즌스 전광판">
    <div class="p-head"><span>프레즌스 전광판 · 나의 팀</span><b>몰입 중 3명</b></div>
    <div id="presenceTicker">
      <div class="p-item"><span class="who">정다인</span> — 오늘 바운더리 3개 완료 🎉</div>
      <div class="p-item"><span class="who">최연우</span> — 몰입 중 (숫자언어 정리)</div>
    </div>
  </div>

  <!-- 오브젝트 9종 -->
  <div class="obj" data-obj="lecture"  style="left:16%; top:34%"><div class="art">📺</div><div class="tag">강의 스크린 <small>4/5</small></div></div>
  <div class="obj" data-obj="records"  style="left:36%; top:33%"><div class="art">📚</div><div class="tag">업무 기록 책장</div></div>
  <div class="obj" data-obj="tree"     style="left:88%; top:26%"><div class="art" style="font-size:64px">🌳</div><div class="tag">성과열매 나무 <small>Lv.3</small></div></div>
  <div class="obj" data-obj="coachR"   style="left:66%; top:35%"><div class="art small">🐢</div><div class="tag">기록 코치</div></div>
  <div class="obj" data-obj="worktool" style="left:28%; top:62%"><div class="art">🗒️</div><div class="tag">워크툴 책상 <small>오늘 2/3</small></div></div>
  <div class="obj" data-obj="goal100"  style="left:11%; top:66%"><div class="art small">📓</div><div class="tag">목표 100번 쓰기</div></div>
  <div class="obj" data-obj="diary"    style="left:7%;  top:82%"><div class="art small">📔</div><div class="tag">개인 일기장</div></div>
  <div class="obj" data-obj="coachB"   style="left:58%; top:68%"><div class="art">🦉</div><div class="tag">바운더리 코치</div></div>
  <div class="obj" data-obj="mailbox"  style="left:90%; top:64%"><div class="art">📮</div><div class="tag">우체통 <small>새 소식 1</small></div></div>

  <!-- 나 -->
  <div class="me" id="me" style="left:44%; bottom:18%">
    <div class="bubble" id="meBubble"></div>
    <div class="nametag">김이서</div>
    <div class="body"><div class="sprite" id="meSprite"></div></div>
    <div class="shadow"></div>
  </div>
</div>

<div class="hint">방향키·WASD로 걸어요 · 가까이 가면 Space로 열기 · 클릭해도 돼요</div>
<div class="proto-tag">마이스페이스 프로토타입 · 목데이터</div>

<!-- ============ 패널 (장면 위에 얹힘) ============ -->
<div class="panel" id="panel">

<script>
/* ================= 픽셀 스프라이트 캐릭터 ================= */
const SPRITE_MAP = [
  '..HHHHHHHH..',
  '.HHHHHHHHHH.',
  '.HHHHHHHHHH.',
  '.HHSSSSSSHH.',
  '..SESSSSES..',
  '..SSSSSSSS..',
  '...SSSSSS...',
  '..TTTTTTTT..',
  '.TTTTTTTTTT.',
  '.TSTTTTTTST.',
  '..TTTTTTTT..',
  '..PPPPPPPP..',
  '..PPP..PPP..',
  '..PPP..PPP..',
  '..DDD..DDD..',
];
const SPRITE_COLORS = {H:'#4A3628', S:'#F2C9A8', E:'#222831', T:'#3182F6', P:'#2B3442', D:'#6E5236'};
(function drawSprite(){
  const px = 3, shadows = [];
  SPRITE_MAP.forEach((row, y)=>{
    [...row].forEach((ch, x)=>{
      const c = SPRITE_COLORS[ch];
      if(c) shadows.push(`${x*px}px ${y*px}px 0 0 ${c}`);
    });
  });
  document.getElementById('meSprite').style.boxShadow = shadows.join(',');
})();

/* ================= 캐릭터 이동 ================= */
const me = document.getElementById('me');
const scene = document.getElementById('scene');
const bubble = document.getElementById('meBubble');
let walkTimer = null;
let px = 44, pb = 18; // 현재 위치(%)

function applyDepth(){
  // 아래(가까이)일수록 크게, 위(멀리)일수록 작게 + 앞뒤 정렬
  const s = 0.82 + Math.max(0, Math.min(1, (40 - pb) / 40)) * 0.34;
  me.style.transform = `translate(-50%,0) scale(${s})`;
  me.style.zIndex = Math.round((100 - pb) * 10);
}
function walkTo(leftPct, bottomPct, cb){
  if(leftPct < px) me.classList.add('flip'); else if(leftPct > px) me.classList.remove('flip');
  px = leftPct; pb = bottomPct;
  me.style.transition = 'left .7s ease, bottom .7s ease, transform .7s ease';
  me.classList.add('walking');
  me.style.left = leftPct + '%';
  me.style.bottom = bottomPct + '%';
  applyDepth();
  clearTimeout(walkTimer);
  walkTimer = setTimeout(()=>{ me.classList.remove('walking'); walkTimer = null; checkProximity(); cb && cb(); }, 720);
}
function say(text){
  bubble.textContent = text; bubble.classList.add('show');
  setTimeout(()=>bubble.classList.remove('show'), 1800);
}

/* 바닥 클릭 → 그냥 걷기 */
scene.addEventListener('click', e=>{
  if(e.target !== scene && !e.target.classList.contains('bg-floor') && !e.target.classList.contains('bg-grass')) return;
  const r = scene.getBoundingClientRect();
  const x = (e.clientX - r.left) / r.width * 100;
  const yFromTop = (e.clientY - r.top) / r.height * 100;
  if(yFromTop < 56) return; // 건물 위쪽은 못 걸음
  walkTo(x, Math.max(4, Math.min(38, 100 - yFromTop - 8)));
});

/* 오브젝트 클릭 → 다가가서 열기 */
const objTargets = { // 캐릭터가 설 위치 (left%, bottom%)
  lecture:[16,38], records:[36,38], tree:[85,36], coachR:[66,36],
  worktool:[28,28], goal100:[13,26], diary:[9,11], coachB:[56,24], mailbox:[87,26], presence:[50,40]
};
document.querySelectorAll('[data-obj]').forEach(el=>{
  el.addEventListener('click', e=>{
    e.stopPropagation();
    const id = el.dataset.obj;
    const t = objTargets[id];
    document.querySelectorAll('.obj').forEach(o=>o.classList.remove('near'));
    if(el.classList.contains('obj')) el.classList.add('near');
    walkTo(t[0], t[1], ()=>openPanel(id));
  });
});

/* ================= 키보드 이동 · 원근 · 근접 ================= */
const KEYMAP = {ArrowLeft:[-1,0], ArrowRight:[1,0], ArrowUp:[0,1], ArrowDown:[0,-1], a:[-1,0], d:[1,0], w:[0,1], s:[0,-1]};
const keys = new Set();
let nearId = null;

window.addEventListener('keydown', e=>{
  if(e.target.tagName==='INPUT' || e.target.tagName==='TEXTAREA' || e.target.isContentEditable) return;
  if(KEYMAP[e.key]){ keys.add(e.key); e.preventDefault(); }
  if((e.key===' ' || e.key==='Enter') && nearId && !panel.classList.contains('open')){
    e.preventDefault(); openPanel(nearId);
  }
});
window.addEventListener('keyup', e=>keys.delete(e.key));

function checkProximity(){
  let best = null, bestD = 11; // 근접 반경(%)
  for(const id in objTargets){
    const t = objTargets[id];
    const d = Math.hypot((t[0]-px)*0.8, t[1]-pb);
    if(d < bestD){ bestD = d; best = id; }
  }
  if(best !== nearId){
    nearId = best;
    document.querySelectorAll('[data-obj]').forEach(el=>{
      el.classList.toggle('near', el.dataset.obj === nearId);
    });
  }
}
function stepLoop(){
  let dx = 0, db = 0;
  keys.forEach(k=>{ const v = KEYMAP[k]; if(v){ dx += v[0]; db += v[1]; } });
  if(dx || db){
    clearTimeout(walkTimer); walkTimer = null;
    me.style.transition = 'none';
    px = Math.max(2, Math.min(98, px + dx * 0.6));
    pb = Math.max(3, Math.min(38, pb + db * 0.45));
    me.style.left = px + '%'; me.style.bottom = pb + '%';
    if(dx) me.classList.toggle('flip', dx < 0);
    me.classList.add('walking');
    applyDepth(); checkProximity();
  } else if(!walkTimer){
    me.classList.remove('walking');
  }
  requestAnimationFrame(stepLoop);
}
applyDepth(); checkProximity(); stepLoop();

/* 오브젝트 깊이 정렬 — 캐릭터가 가구 앞뒤로 지나감 */
document.querySelectorAll('.obj').forEach(o=>{
  const t = objTargets[o.dataset.obj];
  if(t) o.style.zIndex = Math.round((100 - t[1]) * 10) - 5;
});

    <div class="newscard"><div class="n-top"><b>이하람</b><span>1시간 전</span></div><p>회고 작성 완료. "인터뷰 질문이 늘 문제였다"</p><button class="cheer">📣 응원 보내기</button></div>
    <div class="newscard"><div class="n-top"><b>오세진</b><span>3일 전</span></div><p>마지막 소식이 3일 전이에요.</p><button class="cheer">📣 응원 보내기</button></div>
  </div>
  <div id="pt-channel" style="display:none">
    <div class="newscard"><div class="n-top"><b>박준호 (07팀)</b><span>5분 전</span></div><p>도움 제공 완료 — 랜딩 카피 피드백</p><button class="cheer">📣 응원 보내기</button></div>
    <div class="newscard"><div class="n-top"><b>황보라 (02팀)</b><span>30분 전</span></div><p>목표 100번 쓰기 연속 18일!</p><button class="cheer">📣 응원 보내기</button></div>
  </div>
  <div class="pnote">응원을 보내면 팀원에게 살짝 알림이 가요. 말 걸 필요 없이 마음만!</div>`;

P.rank = `
  <h3>랭킹 <span class="pill mut">탭으로만 열림</span></h3>
  <div class="p-sub">궁금할 때만 열어보는 순위예요.</div>
  <div class="row"><span>1. 박준호</span><b class="num">신뢰 81 · 완료 118</b></div>
  <div class="row"><span>2. 김이서 (나)</span><b class="num">신뢰 84 · 완료 102</b></div>
  <div class="row"><span>3. 정다인</span><b class="num">신뢰 79 · 완료 97</b></div>
  <div class="pnote">숫자에 쫓기지 말라고, 보고 싶을 때만 열리게 했어요.</div>`;

P.noti = `
  <h3>알림 <span class="pill mut">부르기만</span></h3>
  <div class="p-sub">알림은 부르기만 해요 — 누르면 그 자리로 데려다줘요.</div>
  <div class="row"><span>📩 정다인 — "이서야, 무슨 일 있어?" · 내가 쌓아온 기록 3개와 함께</span><span class="pill sh">팀의 문자</span></div>
  <div class="row"><span>📣 응원 받음 — 정다인이 응원을 보냈어요</span><span class="pill ok">전광판</span></div>
  <div class="row"><span>💬 내 도움 글 답변 도착</span><span class="pill sh">광장으로</span></div>
  <div class="pnote">밤 12시부터 아침 8시까지는 조용히 모아뒀다가 아침에 보여드려요.</div>`;

function openPanel(id){
  if(!P[id]) return;
  if(MODE==='trial' && !UNLOCKED.includes(id)){
    panelBody.innerHTML = lockPanel(id);
    panel.classList.add('open');
    say('여긴 아직 잠겨 있네');
    return;
  }
  panelBody.innerHTML = P[id];
  if(MODE==='demo'){
    const note = document.createElement('div');
    note.className = 'pnote';
    note.innerHTML = '<b>👀 예시 화면이에요</b> — 지금 보는 건 대표 캐릭터의 샘플이고, 가입하면 나의 이야기로 채워져요. <a href="onboarding-prototype.html" style="color:var(--tide);font-weight:700">가입하기 →</a>';
    panelBody.appendChild(note);
  }
  panel.classList.add('open');
  bindPanel(id);
  const says = {worktool:'오늘 하나 남았다!', diary:'아무도 못 보는 곳…', coachB:'좋은 아침이에요', tree:'조금만 더 크면 Lv.4', mailbox:'답장 왔나?'};
  if(says[id]) say(says[id]);
}
function lockPanel(id){
  return `<h3>🔒 ${FEAT_NAMES[id] || '잠긴 기능'}</h3>
  <div class="p-sub">이 기능은 아직 잠겨 있어요.</div>
  <div class="pnote">가입하면 딱 한 번, <b>기능 2개가 무료로</b> 열려요. 어떤 게 열릴지는 열어봐야 알아요. 나머지는 강의를 결제하면 전부 열려요.</div>
  <div style="display:flex;flex-direction:column;gap:8px;margin-top:14px">
    <button class="pbtn" onclick="location.href='payment-prototype.html'">강의 결제하고 전부 열기</button>
    <button class="pbtn ghost" onclick="closePanel()">닫기</button>
  </div>`;
}
function bindPanel(id){
  panelBody.querySelectorAll('.cheer').forEach(b=>b.addEventListener('click', ()=>{
    b.textContent = '응원을 보냈어요 ✓'; b.classList.add('sent');
  }));
  panelBody.querySelectorAll('.ptabs button').forEach(b=>b.addEventListener('click', ()=>{
    panelBody.querySelectorAll('.ptabs button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    panelBody.querySelector('#pt-team').style.display = b.dataset.pt==='team' ? '' : 'none';
    panelBody.querySelector('#pt-channel').style.display = b.dataset.pt==='channel' ? '' : 'none';
  }));
  const bdDone = panelBody.querySelector('#bdDone');
  if(bdDone) bdDone.addEventListener('click', ()=>{
    const cb = panelBody.querySelector('#bd3'); cb.checked = true;
    cb.closest('.check-item').classList.add('done');
    bdDone.textContent = '오늘 3개 완료! ◗ +1'; bdDone.classList.add('done');
    say('오늘 3개 다 했다!');
  });
}

/* 상단바 */
document.getElementById('chipRank').addEventListener('click', ()=>{ panelBody.innerHTML = P.rank; panel.classList.add('open'); });
document.getElementById('chipNoti').addEventListener('click', ()=>{ panelBody.innerHTML = P.noti; panel.classList.add('open'); });
document.getElementById('chipMap').addEventListener('click', ()=>{
  say('마을로 나가볼까!');
  setTimeout(()=>location.href='plaza-prototype.html', 600);
});

/* ================= 모드 (demo / trial / full) ================= */
const params = new URLSearchParams(location.search);
const MODE = params.get('mode') || localStorage.getItem('trus_mode') || 'full';
const UNLOCKED = JSON.parse(localStorage.getItem('trus_unlocked') || '[]');
const FEAT_NAMES = {lecture:'강의 스크린', worktool:'워크툴 책상', records:'업무 기록 책장', goal100:'목표 100번 쓰기', diary:'개인 일기장', coachB:'바운더리 코치', coachR:'기록 코치', mailbox:'우체통', tree:'성과열매 나무', presence:'프레즌스 전광판'};
const banner = document.getElementById('modeBanner');
const myName = me.querySelector('.nametag');

if(MODE==='demo'){
  myName.textContent = '트루';
  banner.className = 'mode-banner demo show';
  banner.innerHTML = `<span>👀 예시 화면 — 대표 캐릭터 <b>트루</b>로 모든 기능을 구경하는 중. 데이터는 전부 샘플!</span><span class="spacer"></span>
    <button class="mb-btn" onclick="location.href='onboarding-prototype.html'">Sign up</button>
    <button class="mb-btn" onclick="location.href='home-prototype.html'">← 메인 홈</button>`;
}else if(MODE==='trial'){
  myName.textContent = localStorage.getItem('trus_name') || '김이서';
  const openNames = UNLOCKED.map(id=>FEAT_NAMES[id]).filter(Boolean).join(' · ');
  banner.className = 'mode-banner trial show';
  banner.innerHTML = `<span>🔓 무료 체험 — <b>${openNames || '기능 2개'}</b>만 열려 있어요 (최대 1회). 나머지는 잠금!</span><span class="spacer"></span>
    <button class="mb-btn" onclick="location.href='payment-prototype.html'">강의 결제하고 전부 열기</button>`;
  document.querySelectorAll('.obj').forEach(o=>{
    if(!UNLOCKED.includes(o.dataset.obj)) o.classList.add('locked');
  });
  if(!UNLOCKED.includes('presence')) document.querySelector('.presence').classList.add('locked');
}else{
  myName.textContent = localStorage.getItem('trus_name') || '김이서';
  if(params.get('paid')) setTimeout(()=>say('전부 열렸다! 이제 진짜 시작이야 🎉'), 600);
}

/* 전광판 티커 로테이션 */
const tickerItems = [
  ['정다인','오늘 바운더리 3개 완료 🎉'],
  ['최연우','몰입 중 (숫자언어 정리)'],
  ['이하람','회고 작성'],
  ['박준호','도움 제공 완료 (채널)'],
  ['정다인','목표 100번 쓰기 완료'],
];
let tick = 0;
setInterval(()=>{
  tick = (tick+1) % tickerItems.length;
  const rows = [0,1,2].map(i=>{
    const it = tickerItems[(tick+i)%tickerItems.length];
    return `<div class="p-item"><span class="who">${it[0]}</span> — ${it[1]}</div>`;
  });
  document.getElementById('presenceTicker').innerHTML = rows.join('');
}, 4000);
</script>
